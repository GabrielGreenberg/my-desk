<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Desk</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f5f5f7">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#1a1a1f">
  <meta name="theme-color" content="#f5f5f7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="My Desk">
  <link rel="icon" href="icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,300..600,0..100;1,9..144,300..600,0..100&family=Geist:wght@300..600&display=swap" rel="stylesheet">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100vh; }
    body {
      font-family: 'Geist', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: var(--text);
      background: var(--bg);
      background-attachment: fixed;
      transition: background 2s ease, color 0.8s ease;
      overflow-x: hidden;
    }
    input, button, textarea, select { font-family: inherit; color: inherit; }
    button { cursor: pointer; }

    .glow {
      position: fixed;
      width: 60vw; height: 60vw; max-width: 700px; max-height: 700px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--accent-glow), transparent 70%);
      top: -15%; right: -15%;
      filter: blur(40px);
      pointer-events: none;
      z-index: 0;
      transition: background 1.5s ease;
    }

    .app {
      max-width: 680px;
      margin: 0 auto;
      padding: 56px 28px 80px;
      position: relative;
      z-index: 1;
    }

    /* ──────── Top chrome (auth + fullscreen) ──────── */
    #auth-bar {
      position: fixed;
      top: 12px;
      left: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 50;
      font-size: 11px;
      color: var(--text-dim);
    }
    #sign-in-btn {
      background: var(--surface);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--text-dim);
      font-size: 11px;
      padding: 6px 12px;
      letter-spacing: 0.3px;
      transition: border-color 0.15s, color 0.15s;
    }
    #sign-in-btn:hover { border-color: var(--border-hi); color: var(--text); }
    #user-info {
      display: none;
      align-items: center;
      gap: 8px;
    }
    #user-info img {
      width: 22px; height: 22px;
      border-radius: 50%;
      opacity: 0.9;
    }
    #sign-out-btn {
      background: none;
      border: none;
      color: var(--text-mute);
      font-size: 10px;
      text-decoration: underline;
      padding: 0;
    }
    #sign-out-btn:hover { color: var(--text-dim); }
    #sync-status {
      font-size: 10px;
      color: var(--text-mute);
      letter-spacing: 0.3px;
      transition: opacity 0.3s;
    }
    #sync-status.error { color: #e07868; }
    #sync-status.local { color: var(--accent); }

    #fs-btn, #settings-btn {
      position: fixed;
      top: 12px;
      background: var(--surface);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--text-dim);
      font-size: 12px;
      padding: 6px 10px;
      line-height: 1;
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      z-index: 50;
      transition: color 0.15s, border-color 0.15s;
    }
    #fs-btn { right: 16px; }
    #settings-btn { right: 56px; font-size: 13px; }
    #fs-btn:hover, #settings-btn:hover { color: var(--text); border-color: var(--border-hi); }

    /* ──────── Header ──────── */
    header.top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 36px;
    }
    .clock {
      font-family: 'Fraunces', serif;
      font-weight: 300;
      font-size: clamp(44px, 7vw, 60px);
      line-height: 1;
      letter-spacing: -0.5px;
      color: var(--text);
      font-variant-numeric: tabular-nums;
      font-variation-settings: "SOFT" 100, "opsz" 144;
    }
    .date {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-size: 14px;
      color: var(--text-dim);
      margin-top: 4px;
    }
    .phase {
      color: var(--accent);
      font-style: normal;
      font-weight: 500;
      font-family: 'Geist', sans-serif;
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-left: 8px;
    }
    .weather-pill {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 14px;
      background: var(--surface);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 999px;
      font-family: 'Geist', system-ui, sans-serif;
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.3px;
      font-variant-numeric: tabular-nums;
      font-weight: 500;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .weather-pill .glyph { color: var(--accent); font-size: 13px; line-height: 1; }

    /* ──────── Section head ──────── */
    .section-head {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-dim);
      font-weight: 500;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .section-head .meta {
      font-family: 'Geist', system-ui, sans-serif;
      font-size: 10px;
      color: var(--text-mute);
      letter-spacing: 0.5px;
      font-weight: 500;
      font-variant-numeric: tabular-nums;
      text-transform: none;
    }

    #list, #backlog {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    /* ──────── Item row ──────── */
    .item {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .item.dragging { opacity: 0.4; }
    .item.checked:not(.timer) .bar-fill { background: var(--bar-done); }

    .item-row {
      position: relative;
      overflow: hidden;
      min-height: 48px;
      background: var(--surface);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 10px;
      transition: border-color 0.2s;
    }
    .item-row:hover { border-color: var(--border-hi); }
    .item.running .item-row { border-color: var(--accent-mid); }

    .drop-indicator {
      height: 2px;
      background: var(--accent);
      border-radius: 1px;
      margin: -2px 0;
      display: none;
      pointer-events: none;
    }
    .drop-indicator.visible { display: block; }

    .bar-fill {
      position: absolute; inset: 0;
      width: 0%;
      background: var(--bar-fill);
      transition: width 0.35s ease, background 0.6s ease;
      pointer-events: none;
      z-index: 0;
    }
    .item.done .bar-fill { background: var(--bar-done); }

    .playhead {
      position: absolute; top: 0; bottom: 0;
      width: 2px;
      background: var(--accent);
      transform: translateX(-1px);
      pointer-events: none;
      transition: left 0.35s ease;
      z-index: 1;
    }
    .item.running .playhead {
      box-shadow: 0 0 12px var(--accent), 0 0 3px var(--accent);
    }
    .item.done .playhead,
    .item:not(.has-progress) .playhead { display: none; }

    .scrub-handle {
      position: absolute; top: 0; bottom: 0;
      width: 28px;
      transform: translateX(-50%);
      cursor: ew-resize;
      z-index: 4;
      touch-action: none;
      display: flex; align-items: center; justify-content: center;
    }
    .scrub-handle::before {
      content: '';
      width: 4px; height: 20px;
      border-radius: 2px;
      background: var(--accent);
      box-shadow: 0 0 0 1.5px var(--bg-solid), 0 1px 4px rgba(0,0,0,0.25);
      opacity: 0;
      transition: opacity 0.15s, transform 0.15s;
    }
    .item:hover .scrub-handle::before,
    .item:active .scrub-handle::before { opacity: 1; transform: scaleY(1.15); }
    .scrub-handle:active::before { opacity: 1; transform: scaleY(1.25); }
    .item.done .scrub-handle,
    .item:not(.has-progress) .scrub-handle { display: none; }

    .item-content {
      position: relative;
      z-index: 3;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 13px;
    }

    .check-btn {
      width: 18px; height: 18px;
      border-radius: 50%;
      border: 1.5px solid var(--text-mute);
      background: transparent;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: 10px;
      color: var(--bg-solid);
      font-weight: 600;
      padding: 0;
      transition: all 0.15s;
    }
    .check-btn.on {
      border-color: var(--accent);
      background: var(--accent);
    }
    .check-btn:hover { border-color: var(--accent); }

    .item-label {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-size: 14px;
      color: var(--text);
      min-width: 0;
    }
    .item-label::placeholder { color: var(--text-mute); }
    .item.done .item-label { opacity: 0.5; }
    .item.checked:not(.timer) .item-label { text-decoration: line-through; opacity: 0.5; }

    .play-btn {
      width: 24px; height: 24px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 9px;
      padding: 0;
      flex-shrink: 0;
      transition: all 0.15s;
    }
    .play-btn:hover {
      background: var(--accent);
      color: var(--bg-solid);
      border-color: var(--accent);
    }

    .timer-display {
      font-family: 'Geist', system-ui, sans-serif;
      font-size: 11px;
      font-weight: 500;
      font-variant-numeric: tabular-nums;
      color: var(--text-dim);
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 3px;
    }
    .time-input {
      width: 58px;
      background: rgba(0,0,0,0.08);
      border: 1px solid transparent;
      border-radius: 4px;
      padding: 2px 4px;
      text-align: center;
      font: inherit;
      color: inherit;
      font-size: 11px;
    }
    .time-input:focus {
      border-color: var(--accent);
      background: var(--surface-hi);
      outline: none;
    }

    .time-adjust {
      display: flex;
      flex-direction: column;
      gap: 1px;
      margin-left: 2px;
    }
    .time-adjust button {
      width: 16px; height: 10px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-mute);
      border-radius: 2px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .time-adjust button:hover { color: var(--text); border-color: var(--text-dim); }
    .time-adjust svg { width: 7px; height: 4px; display: block; }

    .icon-btn {
      background: transparent;
      border: none;
      color: var(--text-mute);
      width: 24px; height: 24px;
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      padding: 0;
      flex-shrink: 0;
      font-size: 12px;
      transition: color 0.15s, background 0.15s;
    }
    .icon-btn:hover { color: var(--text); background: rgba(255,255,255,0.06); }
    .icon-btn.has-notes { color: var(--accent); }
    .icon-btn svg { width: 11px; height: 11px; display: block; }

    .notes-area {
      display: none;
      padding: 10px 12px;
      position: relative;
      background: var(--surface);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 10px;
      transition: border-color 0.2s;
    }
    .notes-area.open { display: block; }
    .notes-area:hover { border-color: var(--border-hi); }
    .notes-area:focus-within { border-color: var(--accent); }
    .notes-area textarea {
      width: 100%;
      background: transparent;
      border: none;
      padding: 2px 4px;
      color: var(--text);
      font-size: 13px;
      resize: vertical;
      min-height: 54px;
      outline: none;
      font-family: 'Geist', sans-serif;
      line-height: 1.5;
    }

    /* ──────── Add row ──────── */
    .add-row {
      display: flex;
      gap: 6px;
      margin-top: 14px;
      margin-bottom: 36px;
    }
    .add-btn {
      flex: 1;
      padding: 8px 10px;
      background: var(--surface);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-dim);
      font-size: 12px;
      letter-spacing: 0.2px;
      transition: all 0.15s;
    }
    .add-btn:hover { color: var(--text); border-color: var(--border-hi); }
    .add-btn.recording {
      color: #e07868;
      border-color: #e07868;
      animation: pulseBorder 1.2s infinite;
    }
    @keyframes pulseBorder { 0%, 100% { opacity: 1; } 50% { opacity: 0.55; } }
    #voice-status {
      text-align: center;
      font-size: 11px;
      color: var(--text-mute);
      margin-top: -28px;
      margin-bottom: 28px;
      min-height: 1em;
    }
    #voice-status:empty { display: none; }

    /* ──────── Backlog section ──────── */
    .backlog-head { margin-top: 0; margin-bottom: 10px; }
    .backlog-head .actions {
      display: flex;
      gap: 6px;
    }
    .backlog-head .sm-btn {
      padding: 3px 9px;
      font-size: 11px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-dim);
      letter-spacing: 0.2px;
      text-transform: none;
      font-weight: 500;
    }
    .backlog-head .sm-btn:hover { color: var(--text); border-color: var(--border-hi); }
    .backlog-head .sm-btn.recording {
      color: #e07868;
      border-color: #e07868;
      animation: pulseBorder 1.2s infinite;
    }

    .backlog-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 13px;
      background: var(--surface);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: 8px;
      transition: border-color 0.15s, opacity 0.2s;
    }
    .backlog-item:hover { border-color: var(--border-hi); }
    .backlog-item.done { opacity: 0.5; }
    .backlog-item.done .title { text-decoration: line-through; }
    .backlog-item .check-btn { width: 15px; height: 15px; font-size: 9px; }
    .backlog-item .title {
      flex: 1;
      font-size: 13px;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      min-width: 0;
    }
    .backlog-item .due {
      font-family: 'Geist', system-ui, sans-serif;
      font-size: 10px;
      color: var(--text-mute);
      letter-spacing: 0.3px;
      font-variant-numeric: tabular-nums;
      font-weight: 500;
    }
    .backlog-item .due.overdue { color: #e08866; }
    .backlog-item .icon-btn { width: 18px; height: 18px; }

    #backlog-new-row {
      display: none;
      gap: 6px;
      margin-top: 8px;
    }
    #backlog-new-row.open { display: flex; }
    #backlog-new-input {
      flex: 1;
      padding: 8px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      color: var(--text);
      outline: none;
    }
    #backlog-new-input:focus { border-color: var(--accent); }
    #backlog-new-submit {
      padding: 8px 16px;
      border: 1px solid var(--accent);
      border-radius: 8px;
      background: var(--accent);
      color: var(--bg-solid);
      font-size: 12px;
      font-weight: 500;
    }

    /* ──────── Settings panel ──────── */
    #settings-panel {
      position: fixed;
      top: 56px;
      right: 16px;
      width: 260px;
      background: var(--surface-hi);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border-hi);
      border-radius: 12px;
      padding: 14px 16px 16px;
      z-index: 60;
      display: none;
      color: var(--text);
      box-shadow: 0 8px 28px rgba(0,0,0,0.22);
    }
    #settings-panel.open { display: block; }
    #settings-panel h3 {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-dim);
      font-weight: 500;
      margin-bottom: 12px;
    }
    #settings-panel .field {
      margin-bottom: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    #settings-panel label {
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.3px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    #settings-panel label .val {
      color: var(--accent);
      font-variant-numeric: tabular-nums;
    }
    #settings-panel input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }
    #settings-panel select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 4px 8px;
      font-size: 12px;
      outline: none;
    }
    #settings-panel select:focus { border-color: var(--accent); }
    #settings-panel .row-check {
      flex-direction: row;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text);
    }
    #settings-panel input[type="checkbox"] {
      accent-color: var(--accent);
    }
    #settings-panel .hint {
      margin-top: 8px;
      font-size: 10px;
      color: var(--text-mute);
      letter-spacing: 0.3px;
    }

    /* ──────── Responsive ──────── */
    @media (max-width: 720px) {
      .app { padding: 44px 16px 60px; }
      header.top {
        flex-direction: column;
        align-items: flex-start;
        margin-bottom: 28px;
      }
      .clock { font-size: 42px; }
      .item-content { padding: 9px 10px; gap: 7px; }
      .item-label { font-size: 13.5px; }
      .timer-display { font-size: 10px; }
      .time-input { width: 46px; font-size: 10px; }
      .add-btn { font-size: 11px; padding: 7px 6px; }
      #settings-panel { right: 16px; left: 16px; width: auto; }
    }
  </style>
</head>
<body>

<div class="glow" id="glow"></div>

<div id="auth-bar">
  <button id="sign-in-btn" onclick="signIn()">Sign in</button>
  <div id="user-info">
    <img id="user-avatar" src="" alt="" />
    <span id="user-name"></span>
    <button id="sign-out-btn" onclick="signOut()">sign out</button>
  </div>
  <span id="sync-status"></span>
</div>
<button id="settings-btn" onclick="toggleSettings()" title="Settings (,)">☼</button>
<button id="fs-btn" onclick="toggleFullscreen()" title="Toggle fullscreen">&#x26F6;</button>

<div class="app">
  <header class="top">
    <div>
      <div class="clock" id="clock">—</div>
      <div class="date"><span id="date">—</span><span class="phase" id="phase"></span></div>
    </div>
    <div class="weather-pill">
      <span class="glyph" id="weather-glyph">◐</span>
      <span id="weather-text">58° · mostly cloudy · sunset 7:42</span>
    </div>
  </header>

  <div class="section-head">
    <span>Today <span id="today-meta" class="meta"></span></span>
    <span class="meta" id="running-indicator"></span>
  </div>
  <div id="list"></div>

  <div class="add-row">
    <button class="add-btn" id="voice-btn" onclick="toggleVoice()">+ Voice</button>
    <button class="add-btn" onclick="addTodo()">+ To-do</button>
    <button class="add-btn" onclick="addTimer()">+ Timer</button>
    <button class="add-btn" onclick="archiveAllChecked()">Archive</button>
  </div>
  <div id="voice-status"></div>

  <div class="section-head backlog-head">
    <span>Backlog · Notion <span id="backlog-meta" class="meta"></span></span>
    <div class="actions">
      <button class="sm-btn" id="backlog-voice-btn" onclick="toggleNotionVoice()">+ Voice</button>
      <button class="sm-btn" onclick="toggleBacklogNew()">+ New</button>
      <button class="sm-btn" onclick="loadNotionTasks()">↻</button>
      <button class="sm-btn" onclick="notionArchiveAllDone()">Archive</button>
    </div>
  </div>
  <div id="backlog-voice-status" style="text-align:center;font-size:11px;color:var(--text-mute);min-height:0;"></div>
  <div id="backlog"></div>
  <div id="backlog-new-row">
    <input id="backlog-new-input" placeholder="New Notion task…" onkeydown="if(event.key==='Enter')submitBacklogNew()" />
    <button id="backlog-new-submit" onclick="submitBacklogNew()">Add</button>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════════
// Dusk theme engine — ported from design_handoff_my_desk_dusk/prototype/dusk-theme.js
// ════════════════════════════════════════════════════════════════
function duskPhaseForHour(hour) {
  if (hour >= 5  && hour < 12) return 'morning';
  if (hour >= 12 && hour < 17) return 'afternoon';
  if (hour >= 17 && hour < 21) return 'evening';
  return 'night';
}
function duskPhaseLabel(phase) {
  return phase;
}
function duskPalette(phase, hue) {

      borderHi:  `oklch(0.92 0.02 ${H} / 0.24)`,

      accentMid: `oklch(0.70 0.13 ${H})`,
      accentGlow:`oklch(0.72 0.16 ${H} / 0.30)`,

}
function applyDuskTheme(phase, hue) {
  const p = duskPalette(phase, hue);
  const r = document.documentElement.style;
  r.setProperty('--bg', p.bg);
  r.setProperty('--bg-solid', p.bgSolid);
  r.setProperty('--text', p.text);
  r.setProperty('--text-dim', p.textDim);
  r.setProperty('--text-mute', p.textMute);
  r.setProperty('--surface', p.surface);
  r.setProperty('--surface-hi', p.surfaceHi);
  r.setProperty('--border', p.border);
  r.setProperty('--border-hi', p.borderHi);
  r.setProperty('--accent', p.accent);
  r.setProperty('--accent-mid', p.accentMid);
  r.setProperty('--accent-glow', p.accentGlow);
  r.setProperty('--bar-fill', p.barFill);
  r.setProperty('--bar-done', p.barDone);

  document.querySelectorAll('meta[name="theme-color"]').forEach(m => {
    m.setAttribute('content', p.bgTop);
  });
}

// ════════════════════════════════════════════════════════════════
// Preferences (hue, phase override, mute bell)
// ════════════════════════════════════════════════════════════════
const PREFS_KEY = 'desk-dusk-prefs';
let prefs = loadPrefs();

function loadPrefs() {
  try {
    const raw = localStorage.getItem(PREFS_KEY);
    if (raw) {
      const p = JSON.parse(raw);
      return {
        hue: Number.isFinite(p.hue) ? p.hue : 35,
        phaseMode: p.phaseMode || 'auto',
        muteBell: !!p.muteBell,
      };
    }
  } catch {}
  return { hue: 35, phaseMode: 'auto', muteBell: false };
}
function savePrefs() {
  localStorage.setItem(PREFS_KEY, JSON.stringify(prefs));
}
function effectivePhase() {
  if (prefs.phaseMode && prefs.phaseMode !== 'auto') return prefs.phaseMode;
  return duskPhaseForHour(new Date().getHours());
}
function applyTheme() {
  applyDuskTheme(effectivePhase(), prefs.hue);
  updateWeatherGlyph();
  updatePhaseLabel();
}

// ════════════════════════════════════════════════════════════════
// Sync status
// ════════════════════════════════════════════════════════════════
function setSyncStatus(msg, type) {
  const el = document.getElementById('sync-status');
  el.textContent = msg;
  el.className = type || '';
  if (msg) setTimeout(() => { if (el.textContent === msg) el.textContent = ''; }, 3000);
}

// ════════════════════════════════════════════════════════════════
// State
// ════════════════════════════════════════════════════════════════
let items = [];
let _saveTimeout = null;

function save() {
  const data = items.map(i => {
    const clean = {};
    for (const [k, v] of Object.entries(i)) {
      if (!k.startsWith('_') && v !== undefined) clean[k] = v;
    }
    return clean;
  });
  localStorage.setItem('desktop-items', JSON.stringify(data));
  if (currentUser) {
    clearTimeout(_saveTimeout);
    _saveTimeout = setTimeout(() => {
      db.collection('users').doc(currentUser.uid).set({ items: data }, { merge: true })
        .then(() => setSyncStatus('☁ Saved', ''))
        .catch(err => { console.error('Firestore save error:', err); setSyncStatus('Save failed', 'error'); });
    }, 500);
  }
}

async function loadItems() {
  if (currentUser) {
    try {
      const doc = await db.collection('users').doc(currentUser.uid).get();
      if (doc.exists && doc.data().items) {
        items = doc.data().items;
        setSyncStatus('☁ Loaded', '');
      } else {
        items = JSON.parse(localStorage.getItem('desktop-items') || '[]');
        if (items.length > 0) { save(); setSyncStatus('☁ Migrated', ''); }
      }
    } catch (e) {
      console.error('Firestore load error:', e);
      items = JSON.parse(localStorage.getItem('desktop-items') || '[]');
      setSyncStatus('Cloud error', 'error');
    }
  } else {
    items = JSON.parse(localStorage.getItem('desktop-items') || '[]');
    setSyncStatus('Local only', 'local');
  }
  // Flatten any legacy Quill-delta notes to plain text on load.
  items.forEach(i => { if (i.notes) i.notes = notesToPlain(i.notes); });
  renderAll();
  resumeTimers();
}

// Legacy Quill-delta notes → plain text. Fresh notes are already plain.
function notesToPlain(s) {
  if (!s) return '';
  if (typeof s !== 'string') return String(s);
  try {
    const d = JSON.parse(s);
    if (d && Array.isArray(d.ops)) {
      return d.ops.map(op => typeof op.insert === 'string' ? op.insert : '').join('').replace(/\n+$/, '');
    }
  } catch {}
  return s;
}

// ════════════════════════════════════════════════════════════════
// Helpers
// ════════════════════════════════════════════════════════════════
function fmtTime(sec) {
  sec = Math.max(0, Math.round(sec));
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;
  if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}
function parseTime(str) {
  const parts = str.split(':').map(Number);
  if (parts.some(isNaN)) return null;
  if (parts.length === 3) return parts[0]*3600 + parts[1]*60 + parts[2];
  if (parts.length === 2) return parts[0]*60 + parts[1];
  if (parts.length === 1) return parts[0]*60;
  return null;
}
function esc(s) { return (s || '').replace(/"/g, '&quot;').replace(/</g, '&lt;'); }
function hasNotes(item) { return !!(item.notes && item.notes.trim()); }

// ════════════════════════════════════════════════════════════════
// Rendering
// ════════════════════════════════════════════════════════════════
const listEl = document.getElementById('list');

function renderTodo(item, idx) {
  if (!item.notes) item.notes = '';
  const row = document.createElement('div');
  row.className = 'item todo' + (item.checked ? ' checked' : '');
  row.dataset.idx = idx;
  row.setAttribute('draggable', 'true');

  row.innerHTML = `
    <div class="item-row">
      ${item.checked ? '<div class="bar-fill" style="width:100%"></div>' : ''}
      <div class="item-content">
        <button class="check-btn ${item.checked ? 'on' : ''}" data-act="check" title="Toggle">${item.checked ? '✓' : ''}</button>
        <input class="item-label" value="${esc(item.label)}" placeholder="To-do…" />
        <button class="icon-btn ${hasNotes(item) ? 'has-notes' : ''}" data-act="notes" title="Notes">
          <svg viewBox="0 0 10 6" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M1 1l4 4 4-4"/></svg>
        </button>
        <button class="icon-btn" data-act="delete" title="Delete">✕</button>
      </div>
    </div>
    <div class="notes-area ${item._notesOpen ? 'open' : ''}">
      <textarea placeholder="Notes…">${esc(item.notes)}</textarea>
    </div>`;

  wireRow(row, item, idx);
  return row;
}

function renderTimer(item, idx) {
  if (!item.notes) item.notes = '';
  const row = document.createElement('div');
  const pct = item.totalSeconds > 0 ? Math.min(100, (item.elapsed / item.totalSeconds) * 100) : 0;
  const done = pct >= 100;
  row.className = 'item timer has-progress' + (done ? ' done' : '') + (item.running ? ' running' : '');
  row.dataset.idx = idx;
  row.setAttribute('draggable', 'true');

  row.innerHTML = `
    <div class="item-row">
      <div class="bar-fill" style="width:${pct}%"></div>
      <div class="playhead" style="left:${pct}%"></div>
      <div class="scrub-handle" style="left:${pct}%" title="Drag to scrub"></div>
      <div class="item-content">
        <button class="check-btn ${done ? 'on' : ''}" data-act="reset" title="${done ? 'Reset' : 'Clear'}">${done ? '✓' : ''}</button>
        <input class="item-label" value="${esc(item.label)}" placeholder="Timer…" />
        <button class="play-btn" data-act="play" title="${item.running ? 'Pause' : 'Start'}">${item.running ? '❚❚' : '▶'}</button>
        <div class="timer-display">
          <input class="time-input elapsed-input" value="${fmtTime(item.elapsed)}" data-act="elapsed" title="Elapsed" />
          <span style="opacity:.5">/</span>
          <input class="time-input total-input" value="${fmtTime(item.totalSeconds)}" data-act="total" title="Total" />
          <span class="time-adjust">
            <button data-act="up" title="+30 min"><svg viewBox="0 0 10 6" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M1 5l4-4 4 4"/></svg></button>
            <button data-act="down" title="−30 min"><svg viewBox="0 0 10 6" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M1 1l4 4 4-4"/></svg></button>
          </span>
        </div>
        <button class="icon-btn ${hasNotes(item) ? 'has-notes' : ''}" data-act="notes" title="Notes">
          <svg viewBox="0 0 10 6" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M1 1l4 4 4-4"/></svg>
        </button>
        <button class="icon-btn" data-act="delete" title="Delete">✕</button>
      </div>
    </div>
    <div class="notes-area ${item._notesOpen ? 'open' : ''}">
      <textarea placeholder="Notes…">${esc(item.notes)}</textarea>
    </div>`;

  wireRow(row, item, idx);
  const handle = row.querySelector('.scrub-handle');
  if (handle) attachScrub(row, item, handle);
  return row;
}

function wireRow(row, item, idx) {
  // Click delegation for action buttons.
  row.addEventListener('click', e => {
    const btn = e.target.closest('[data-act]');
    if (!btn) return;
    const act = btn.dataset.act;
    if (act === 'check') { item.checked = !item.checked; save(); renderAll(); }
    else if (act === 'reset') {
      if (item.elapsed >= item.totalSeconds) { item.elapsed = 0; item.running = false; stopInterval(item); save(); renderAll(); }
    }
    else if (act === 'play') toggleTimer(item, items.indexOf(item));
    else if (act === 'delete') { stopInterval(item); archiveItem(items.indexOf(item)); }
    else if (act === 'notes') { item._notesOpen = !item._notesOpen; renderAll(); }
    else if (act === 'up') { item.totalSeconds += 1800; save(); renderAll(); }
    else if (act === 'down') {
      item.totalSeconds = Math.max(0, item.totalSeconds - 1800);
      if (item.elapsed > item.totalSeconds) item.elapsed = item.totalSeconds;
      save(); renderAll();
    }
  });

  // Prevent click/drag bleed from inputs.
  row.querySelectorAll('input, textarea, button').forEach(el => {
    el.addEventListener('mousedown', e => e.stopPropagation());
  });

  const label = row.querySelector('.item-label');
  if (label) label.addEventListener('input', e => { item.label = e.target.value; save(); });

  const el = row.querySelector('.elapsed-input');
  if (el) el.addEventListener('change', e => {
    const s = parseTime(e.target.value);
    if (s !== null) { item.elapsed = Math.min(Math.max(0, s), item.totalSeconds || 0); save(); renderAll(); }
  });

  const tot = row.querySelector('.total-input');
  if (tot) tot.addEventListener('change', e => {
    const s = parseTime(e.target.value);
    if (s !== null) { item.totalSeconds = s; save(); renderAll(); }
  });

  const ta = row.querySelector('.notes-area textarea');
  if (ta) {
    let t;
    ta.addEventListener('input', () => {
      item.notes = ta.value;
      clearTimeout(t);
      t = setTimeout(() => {
        save();
        // update has-notes dot without full re-render
        const toggle = row.querySelector('[data-act="notes"]');
        if (toggle) toggle.classList.toggle('has-notes', hasNotes(item));
      }, 400);
    });
  }
}

function attachScrub(row, item, handle) {
  const startDrag = (e) => {
    if (e.button !== undefined && e.button !== 0) return;
    e.preventDefault();
    e.stopPropagation();
    const wasRunning = item.running;
    const getX = ev => (ev.touches && ev.touches[0] ? ev.touches[0].clientX : ev.clientX);
    if (wasRunning) { item.running = false; stopInterval(item); row.classList.remove('running'); }
    const fill = row.querySelector('.bar-fill');
    const head = row.querySelector('.playhead');
    const onMove = ev => {
      ev.preventDefault();
      const rect = row.getBoundingClientRect();
      if (rect.width <= 0) return;
      const ratio = Math.max(0, Math.min(1, (getX(ev) - rect.left) / rect.width));
      item.elapsed = ratio * (item.totalSeconds || 0);
      const pct = ratio * 100;
      if (fill) { fill.style.transition = 'none'; fill.style.width = pct + '%'; }
      if (head) { head.style.transition = 'none'; head.style.left = pct + '%'; }
      handle.style.left = pct + '%';
      const ei = row.querySelector('.elapsed-input');
      if (ei && ei !== document.activeElement) ei.value = fmtTime(item.elapsed);
    };
    const onUp = () => {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      document.removeEventListener('touchmove', onMove);
      document.removeEventListener('touchend', onUp);
      document.removeEventListener('touchcancel', onUp);
      const resume = wasRunning && item.elapsed < item.totalSeconds;
      if (resume) item.running = true;
      save();
      renderAll();
      if (resume) startInterval(item);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
    document.addEventListener('touchmove', onMove, { passive: false });
    document.addEventListener('touchend', onUp);
    document.addEventListener('touchcancel', onUp);
  };
  handle.addEventListener('mousedown', startDrag);
  handle.addEventListener('touchstart', startDrag, { passive: false });
}

// ════════════════════════════════════════════════════════════════
// Bell sound (mutable)
// ════════════════════════════════════════════════════════════════
function playBell() {
  if (prefs.muteBell) return;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const frequencies = [523.25, 659.25, 783.99];
    frequencies.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine'; osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.25, ctx.currentTime + i * 0.15);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.15 + 0.8);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(ctx.currentTime + i * 0.15);
      osc.stop(ctx.currentTime + i * 0.15 + 0.8);
    });
  } catch {}
}

// ════════════════════════════════════════════════════════════════
// Timer engine
// ════════════════════════════════════════════════════════════════
const TICK = 250;
const SAVE_INTERVAL = 5000;
let _autoSaveInterval = null;
function ensureAutoSave() {
  if (_autoSaveInterval) return;
  _autoSaveInterval = setInterval(() => {
    const any = items.some(i => i.type === 'timer' && i.running);
    if (any) save();
    else { clearInterval(_autoSaveInterval); _autoSaveInterval = null; }
  }, SAVE_INTERVAL);
}
function startInterval(item) {
  if (item._interval) return;
  ensureAutoSave();
  item._lastTick = Date.now();
  item._interval = setInterval(() => {
    const now = Date.now();
    item.elapsed += (now - item._lastTick) / 1000;
    item._lastTick = now;
    if (item.elapsed >= item.totalSeconds) {
      item.elapsed = item.totalSeconds;
      item.running = false;
      stopInterval(item);
      save();
      renderAll();
      playBell();
      return;
    }
    const row = listEl.children[items.indexOf(item)];
    if (!row) return;
    const pct = (item.elapsed / item.totalSeconds) * 100;
    const fill = row.querySelector('.bar-fill');
    const head = row.querySelector('.playhead');
    const handle = row.querySelector('.scrub-handle');
    if (fill) fill.style.width = pct + '%';
    if (head) head.style.left = pct + '%';
    if (handle) handle.style.left = pct + '%';
    const ei = row.querySelector('.elapsed-input');
    if (ei && ei !== document.activeElement) ei.value = fmtTime(item.elapsed);
  }, TICK);
  updateRunningIndicator();
}
function stopInterval(item) {
  if (item._interval) { clearInterval(item._interval); item._interval = null; }
  updateRunningIndicator();
}
function toggleTimer(item) {
  if (item.elapsed >= item.totalSeconds) return;
  item.running = !item.running;
  if (item.running) startInterval(item); else stopInterval(item);
  save(); renderAll();
}
function resumeTimers() {
  items.forEach(i => { if (i.type === 'timer' && i.running) startInterval(i); });
}

function updateRunningIndicator() {
  const el = document.getElementById('running-indicator');
  if (!el) return;
  const any = items.some(i => i.type === 'timer' && i.running);
  el.textContent = any ? '● running' : '';
  el.style.color = any ? 'var(--accent)' : 'var(--text-mute)';
}

// ════════════════════════════════════════════════════════════════
// Today meta (hours planned)
// ════════════════════════════════════════════════════════════════
function updateTodayMeta() {
  const el = document.getElementById('today-meta');
  if (!el) return;
  const totalSec = items.filter(i => i.type === 'timer').reduce((s,i) => s + (i.totalSeconds || 0), 0);
  const hrs = totalSec / 3600;
  el.textContent = hrs > 0 ? `· ${hrs.toFixed(1)} hrs planned` : '';
}

// ════════════════════════════════════════════════════════════════
// Adders / archive
// ════════════════════════════════════════════════════════════════
function addTodo() {
  items.push({ type: 'todo', label: '', checked: false, notes: '' });
  save(); renderAll();
  const last = listEl.querySelector('.item:last-of-type .item-label');
  if (last) last.focus();
}
function addTimer() {
  items.push({ type: 'timer', label: '', totalSeconds: 1800, elapsed: 0, running: false, notes: '' });
  save(); renderAll();
  const last = listEl.querySelector('.item:last-of-type .item-label');
  if (last) last.focus();
}
function archiveItem(idx) {
  const item = items.splice(idx, 1)[0];
  if (!item) return;
  stopInterval(item);
  const archived = { ...item, archivedAt: new Date().toISOString() };
  delete archived._interval; delete archived._lastTick; delete archived._notesOpen;
  saveArchive([archived]);
  save(); renderAll();
}
function archiveAllChecked() {
  const isDone = i => (i.type === 'todo' && i.checked) || (i.type === 'timer' && i.totalSeconds > 0 && i.elapsed >= i.totalSeconds);
  const done = items.filter(isDone);
  if (done.length === 0) return;
  done.forEach(i => { if (i._interval) stopInterval(i); });
  const toArchive = done.map(i => {
    const a = { ...i, archivedAt: new Date().toISOString() };
    delete a._interval; delete a._lastTick; delete a._notesOpen;
    return a;
  });
  saveArchive(toArchive);
  items = items.filter(i => !isDone(i));
  save(); renderAll();
}
function saveArchive(arr) {
  if (!currentUser) return;
  const ref = db.collection('users').doc(currentUser.uid).collection('archive');
  arr.forEach(item => { ref.add(JSON.parse(JSON.stringify(item))); });
}

// ════════════════════════════════════════════════════════════════
// Drag to reorder
// ════════════════════════════════════════════════════════════════
let dragIdx = null;
let dropIndicator = null;
function getDropIndicator() {
  if (!dropIndicator) {
    dropIndicator = document.createElement('div');
    dropIndicator.className = 'drop-indicator';
  }
  return dropIndicator;
}
function setupDragOnList() {
  const rows = listEl.querySelectorAll('.item');
  rows.forEach(row => {
    row.addEventListener('dragstart', e => {
      if (e.target.closest('button, input, textarea, .notes-area, .scrub-handle')) {
        e.preventDefault();
        return;
      }
      dragIdx = Number(row.dataset.idx);
      e.dataTransfer.effectAllowed = 'move';
      requestAnimationFrame(() => row.classList.add('dragging'));
    });
    row.addEventListener('dragend', () => {
      row.classList.remove('dragging');
      dragIdx = null;
      const ind = getDropIndicator();
      ind.classList.remove('visible');
      if (ind.parentNode) ind.parentNode.removeChild(ind);
    });
  });
  listEl.ondragover = e => {
    e.preventDefault();
    if (dragIdx === null) return;
    e.dataTransfer.dropEffect = 'move';
    const ind = getDropIndicator();
    const children = [...listEl.querySelectorAll('.item')];
    let insertBefore = null;
    for (const c of children) {
      const r = c.getBoundingClientRect();
      if (e.clientY < r.top + r.height / 2) { insertBefore = c; break; }
    }
    if (insertBefore) listEl.insertBefore(ind, insertBefore);
    else listEl.appendChild(ind);
    ind.classList.add('visible');
  };
  listEl.ondragleave = e => {
    if (!listEl.contains(e.relatedTarget)) {
      const ind = getDropIndicator();
      ind.classList.remove('visible');
    }
  };
  listEl.ondrop = e => {
    e.preventDefault();
    const ind = getDropIndicator();
    ind.classList.remove('visible');
    if (dragIdx === null) return;
    const children = [...listEl.querySelectorAll('.item')];
    let dropIdx = children.length;
    for (let i = 0; i < children.length; i++) {
      const r = children[i].getBoundingClientRect();
      if (e.clientY < r.top + r.height / 2) { dropIdx = i; break; }
    }
    const [moved] = items.splice(dragIdx, 1);
    const insertAt = dropIdx > dragIdx ? dropIdx - 1 : dropIdx;
    items.splice(insertAt, 0, moved);
    dragIdx = null;
    if (ind.parentNode) ind.parentNode.removeChild(ind);
    save(); renderAll();
  };
}

function renderAll() {
  listEl.innerHTML = '';
  items.forEach((item, idx) => {
    listEl.appendChild(item.type === 'timer' ? renderTimer(item, idx) : renderTodo(item, idx));
  });
  setupDragOnList();
  updateTodayMeta();
  updateRunningIndicator();
}

// ════════════════════════════════════════════════════════════════
// Voice → Whisper → Claude pipeline (Today)
// ════════════════════════════════════════════════════════════════
let mediaRecorder = null;
let audioChunks = [];
const voiceBtn = document.getElementById('voice-btn');
const voiceStatus = document.getElementById('voice-status');

function toggleVoice() {
  if (mediaRecorder && mediaRecorder.state === 'recording') stopVoice();
  else startVoice();
}
async function startVoice() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioChunks = [];
    mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
    mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      stream.getTracks().forEach(t => t.stop());
      sendVoice(new Blob(audioChunks, { type: 'audio/webm' }));
    };
    mediaRecorder.start();
    voiceBtn.textContent = '⏹ Stop';
    voiceBtn.classList.add('recording');
    voiceStatus.textContent = 'Recording…';
  } catch (err) {
    voiceStatus.textContent = 'Mic access denied';
    console.error('Mic error:', err);
  }
}
function stopVoice() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
    voiceBtn.textContent = '+ Voice';
    voiceBtn.classList.remove('recording');
    voiceStatus.textContent = 'Processing…';
  }
}
async function sendVoice(blob) {
  try {
    const form = new FormData();
    form.append('audio', blob, 'recording.webm');
    const resp = await fetch('/api/voice', { method: 'POST', body: form });
    const data = await resp.json();
    if (data.error) throw new Error(data.error);
    if (data.tasks && data.tasks.length > 0) {
      data.tasks.forEach(t => items.push(t));
      save(); renderAll();
      voiceStatus.textContent = `Added ${data.tasks.length} task${data.tasks.length > 1 ? 's' : ''}`;
    } else {
      voiceStatus.textContent = 'No tasks found';
    }
    setTimeout(() => { voiceStatus.textContent = ''; }, 3000);
  } catch (err) {
    voiceStatus.textContent = 'Error: ' + err.message;
    console.error('Voice error:', err);
    setTimeout(() => { voiceStatus.textContent = ''; }, 5000);
  }
}

// ════════════════════════════════════════════════════════════════
// Notion backlog
// ════════════════════════════════════════════════════════════════
let notionTasks = [];
const backlogEl = document.getElementById('backlog');
const backlogMetaEl = document.getElementById('backlog-meta');

async function loadNotionTasks() {
  backlogMetaEl.textContent = '· loading…';
  try {
    const resp = await fetch('/api/notion');
    const data = await resp.json();
    if (data.error) throw new Error(data.error);
    notionTasks = data.tasks || [];
    renderNotionTasks();
    backlogMetaEl.textContent = notionTasks.length ? `· ${notionTasks.length}` : '';
  } catch (err) {
    console.error('Notion load error:', err);
    backlogMetaEl.textContent = '· error';
    setTimeout(() => { backlogMetaEl.textContent = ''; }, 3000);
  }
}

function renderNotionTasks() {
  backlogEl.innerHTML = '';
  if (!notionTasks.length) {
    const empty = document.createElement('div');
    empty.style.cssText = 'text-align:center;color:var(--text-mute);font-size:11px;padding:10px;';
    empty.textContent = 'No open tasks';
    backlogEl.appendChild(empty);
    return;
  }
  notionTasks.forEach(task => {
    const row = document.createElement('div');
    const isDone = task.doneStatus === 'Done';
    row.className = 'backlog-item' + (isDone ? ' done' : '');
    const dueStr = task.due ? formatDue(task.due) : '';
    const isOverdue = task.due && new Date(task.due) < new Date() && !isDone;
    row.innerHTML = `
      <button class="check-btn ${isDone ? 'on' : ''}" data-act="check" title="${isDone ? 'Uncheck' : 'Mark done'}">${isDone ? '✓' : ''}</button>
      <input class="title" value="${esc(task.title)}" />
      ${dueStr ? `<span class="due ${isOverdue ? 'overdue' : ''}">${dueStr}</span>` : ''}
      <button class="icon-btn" data-act="del" title="Remove">✕</button>`;
    row.addEventListener('click', e => {
      const btn = e.target.closest('[data-act]');
      if (!btn) return;
      if (btn.dataset.act === 'check') notionToggleDone(task);
      else if (btn.dataset.act === 'del') notionArchive(task, row);
    });
    let titleTimer = null;
    row.querySelector('.title').addEventListener('input', e => {
      clearTimeout(titleTimer);
      titleTimer = setTimeout(() => notionUpdateTitle(task, e.target.value), 800);
    });
    backlogEl.appendChild(row);
  });
}

function formatDue(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const today = new Date(); today.setHours(0,0,0,0);
  const diff = Math.floor((d - today) / 86400000);
  if (diff === 0) return 'Today';
  if (diff === 1) return 'Tomorrow';
  if (diff === -1) return 'Yesterday';
  if (diff > 1 && diff <= 7) return d.toLocaleDateString('en-US', { weekday: 'short' });
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

async function notionToggleDone(task) {
  const newStatus = task.doneStatus === 'Done' ? 'Not started' : 'Done';
  task.doneStatus = newStatus;
  renderNotionTasks();
  try {
    await fetch('/api/notion', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'update', id: task.id, updates: { status: newStatus } })
    });
  } catch (err) {
    console.error('Notion toggle error:', err);
    task.doneStatus = newStatus === 'Done' ? 'Not started' : 'Done';
    renderNotionTasks();
  }
}
async function notionArchive(task, row) {
  row.style.opacity = '0.3';
  try {
    await fetch('/api/notion', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'archive', id: task.id })
    });
    notionTasks = notionTasks.filter(t => t.id !== task.id);
    renderNotionTasks();
  } catch (err) {
    console.error('Notion archive error:', err);
    row.style.opacity = '1';
  }
}
async function notionArchiveAllDone() {
  const doneTasks = notionTasks.filter(t => t.doneStatus === 'Done');
  if (!doneTasks.length) return;
  backlogMetaEl.textContent = `· archiving ${doneTasks.length}…`;
  try {
    await Promise.all(doneTasks.map(task =>
      fetch('/api/notion', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'complete', id: task.id })
      })
    ));
    notionTasks = notionTasks.filter(t => t.doneStatus !== 'Done');
    renderNotionTasks();
    backlogMetaEl.textContent = notionTasks.length ? `· ${notionTasks.length}` : '';
  } catch (err) {
    console.error('Notion archive all error:', err);
    backlogMetaEl.textContent = '· error';
    setTimeout(() => { backlogMetaEl.textContent = ''; }, 3000);
  }
}
async function notionUpdateTitle(task, newTitle) {
  try {
    await fetch('/api/notion', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'update', id: task.id, updates: { title: newTitle } })
    });
    task.title = newTitle;
  } catch (err) {
    console.error('Notion update error:', err);
  }
}

// New task inline
function toggleBacklogNew() {
  const row = document.getElementById('backlog-new-row');
  row.classList.toggle('open');
  if (row.classList.contains('open')) document.getElementById('backlog-new-input').focus();
}
async function submitBacklogNew() {
  const input = document.getElementById('backlog-new-input');
  const title = input.value.trim();
  if (!title) return;
  input.value = '';
  backlogMetaEl.textContent = '· adding…';
  try {
    const resp = await fetch('/api/notion', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'create', title })
    });
    const data = await resp.json();
    if (data.error) throw new Error(data.error);
    notionTasks.unshift(data);
    renderNotionTasks();
    backlogMetaEl.textContent = notionTasks.length ? `· ${notionTasks.length}` : '';
  } catch (err) {
    console.error('Notion create error:', err);
    backlogMetaEl.textContent = '· error';
    setTimeout(() => { backlogMetaEl.textContent = ''; }, 3000);
  }
}

// Notion voice → create task(s) in Notion
let notionMediaRecorder = null;
let notionAudioChunks = [];
const notionVoiceBtn = document.getElementById('backlog-voice-btn');
const notionVoiceStatus = document.getElementById('backlog-voice-status');
function toggleNotionVoice() {
  if (notionMediaRecorder && notionMediaRecorder.state === 'recording') stopNotionVoice();
  else startNotionVoice();
}
async function startNotionVoice() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    notionAudioChunks = [];
    notionMediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
    notionMediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) notionAudioChunks.push(e.data); };
    notionMediaRecorder.onstop = () => {
      stream.getTracks().forEach(t => t.stop());
      sendNotionVoice(new Blob(notionAudioChunks, { type: 'audio/webm' }));
    };
    notionMediaRecorder.start();
    notionVoiceBtn.textContent = '⏹ Stop';
    notionVoiceBtn.classList.add('recording');
    notionVoiceStatus.textContent = 'Recording…';
  } catch (err) {
    notionVoiceStatus.textContent = 'Mic access denied';
    console.error('Mic error:', err);
  }
}
function stopNotionVoice() {
  if (notionMediaRecorder && notionMediaRecorder.state === 'recording') {
    notionMediaRecorder.stop();
    notionVoiceBtn.textContent = '+ Voice';
    notionVoiceBtn.classList.remove('recording');
    notionVoiceStatus.textContent = 'Processing…';
  }
}
async function sendNotionVoice(blob) {
  try {
    const form = new FormData();
    form.append('audio', blob, 'recording.webm');
    const resp = await fetch('/api/voice', { method: 'POST', body: form });
    const data = await resp.json();
    if (data.error) throw new Error(data.error);
    if (data.tasks && data.tasks.length > 0) {
      notionVoiceStatus.textContent = `Creating ${data.tasks.length}…`;
      for (const t of data.tasks) {
        try {
          const r = await fetch('/api/notion', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'create', title: t.label })
          });
          const created = await r.json();
          if (!created.error) notionTasks.unshift(created);
        } catch (e) { console.error('Create error:', e); }
      }
      renderNotionTasks();
      notionVoiceStatus.textContent = `Added ${data.tasks.length}`;
    } else {
      notionVoiceStatus.textContent = 'No tasks found';
    }
    setTimeout(() => { notionVoiceStatus.textContent = ''; }, 3000);
  } catch (err) {
    notionVoiceStatus.textContent = 'Error: ' + err.message;
    console.error('Notion voice error:', err);
    setTimeout(() => { notionVoiceStatus.textContent = ''; }, 5000);
  }
}

// Settings panel
// ════════════════════════════════════════════════════════════════
function toggleSettings() {
  document.getElementById('settings-panel').classList.toggle('open');
}
function initSettingsPanel() {
  const hueInput = document.getElementById('hue-input');
  const hueVal = document.getElementById('hue-val');
  const phaseSelect = document.getElementById('phase-select');
  const muteBell = document.getElementById('mute-bell');
  hueInput.value = prefs.hue;
  hueVal.textContent = prefs.hue;
  phaseSelect.value = prefs.phaseMode;
  muteBell.checked = prefs.muteBell;
  hueInput.addEventListener('input', e => {
    prefs.hue = Number(e.target.value);
    hueVal.textContent = prefs.hue;
    applyTheme();
    savePrefs();
  });
  phaseSelect.addEventListener('change', e => {
    prefs.phaseMode = e.target.value;
    applyTheme();
    savePrefs();
  });
  muteBell.addEventListener('change', e => {
    prefs.muteBell = e.target.checked;
    savePrefs();
  });
  // Keyboard shortcut: comma toggles the panel (unless user is typing in an input).
  document.addEventListener('keydown', e => {
    if (e.key !== ',' || e.metaKey || e.ctrlKey || e.altKey) return;
    const tag = (e.target && e.target.tagName) || '';
    if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
    if (e.target && e.target.isContentEditable) return;
    e.preventDefault();
    toggleSettings();
  });
  // Click outside closes.
  document.addEventListener('click', e => {
    const panel = document.getElementById('settings-panel');
    if (!panel.classList.contains('open')) return;
    if (panel.contains(e.target)) return;
    if (e.target.closest('#settings-btn')) return;
    panel.classList.remove('open');
  });
}
initSettingsPanel();
