<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Desk</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#f5f5f7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="My Desk">
  <link rel="icon" href="icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link href="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.snow.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.js"></script>
  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f7;
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    /* ---- Clock & Date ---- */
    #clock {
      font-size: 5rem;
      font-weight: 200;
      letter-spacing: 4px;
      color: #222;
    }
    #date {
      font-size: 1.15rem;
      color: #888;
      margin-top: 4px;
      margin-bottom: 48px;
    }

    /* ---- List container ---- */
    #list {
      width: 100%;
      max-width: 640px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* ---- Shared item row ---- */
    .item {
      position: relative;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 52px;
      cursor: grab;
    }
    .item.dragging { opacity: 0.4; cursor: grabbing; }

    /* ---- Drag indicator ---- */
    .drop-indicator {
      height: 3px;
      background: #4a90d9;
      border-radius: 2px;
      margin: -2px 0;
      pointer-events: none;
      display: none;
    }
    .drop-indicator.visible { display: block; }

    /* ---- Timer bar background fill ---- */
    .item .bar {
      position: absolute;
      inset: 0;
      background: #4ade80;
      width: 0%;
      transition: width 0.25s linear;
      pointer-events: none;
      border-radius: 10px;
    }
    .item.done .bar { background: #c6f0d4; }

    /* ---- Item content sits above bar ---- */
    .item-content {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      width: 100%;
      padding: 10px 14px;
      gap: 10px;
    }

    .item-label {
      flex: 1;
      font-size: 0.95rem;
      outline: none;
      background: none;
      border: none;
      color: #333;
      font-family: inherit;
    }
    .item-label::placeholder { color: #aaa; }
    /* ---- Checked to-do: green fill like completed timer ---- */
    .item.checked .bar { width: 100% !important; background: #c6f0d4; }
    .item.checked .check-btn { color: #4ade80; }

    /* ---- Timer display ---- */
    .timer-display {
      font-variant-numeric: tabular-nums;
      font-size: 0.85rem;
      color: #666;
      white-space: nowrap;
      min-width: 100px;
      text-align: right;
    }

    /* ---- Buttons ---- */
    .btn {
      background: none;
      border: none;
      color: #999;
      cursor: pointer;
      font-size: 1.05rem;
      padding: 4px;
      line-height: 1;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
    }
    .btn:hover { color: #333; background: rgba(0,0,0,0.05); }

    .check-btn { font-size: 1.1rem; }
    .check-btn.checked { color: #4ade80; }

    /* ---- Time input (for setting duration) ---- */
    .time-input {
      width: 64px;
      background: rgba(0,0,0,0.03);
      border: 1px solid #ddd;
      border-radius: 6px;
      color: #333;
      font-family: inherit;
      font-size: 0.85rem;
      padding: 3px 6px;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }
    .time-input:focus { border-color: #4a90d9; outline: none; }

    /* ---- Notes area ---- */
    .notes-toggle {
      background: none;
      border: none;
      color: #bbb;
      cursor: pointer;
      padding: 2px 4px;
      transition: color 0.15s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .notes-toggle svg { width: 12px; height: 12px; display: block; }
    .notes-toggle:hover { color: #666; }
    .notes-toggle.has-notes { color: #4a90d9; }

    .notes-area {
      display: none;
      position: relative;
      z-index: 1;
      padding: 0 14px 10px 42px;
    }
    .notes-area.open { display: block; }

    /* ---- Quill overrides ---- */
    .notes-area .ql-toolbar {
      border: 1px solid #e0e0e0;
      border-radius: 6px 6px 0 0;
      background: #f9f9fb;
      padding: 4px 6px;
    }
    .notes-area .ql-container {
      border: 1px solid #e0e0e0;
      border-top: none;
      border-radius: 0 0 6px 6px;
      background: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 0.85rem;
      color: #444;
      min-height: 60px;
    }
    .notes-area .ql-editor {
      min-height: 60px;
      padding: 8px;
    }
    .notes-area .ql-editor.ql-blank::before {
      color: #aaa;
      font-style: normal;
    }

    /* ---- Add buttons row ---- */
    #add-row {
      width: 100%;
      max-width: 640px;
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }
    .add-btn {
      flex: 1;
      padding: 6px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: none;
      color: #999;
      font-family: inherit;
      font-size: 0.8rem;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .add-btn:hover { border-color: #999; color: #555; }
    .archive-btn { border-color: #a0b4c8; color: #a0b4c8; }
    .archive-btn:hover { border-color: #7a96b0; color: #7a96b0; }
    .voice-btn { border-color: #c8a0a0; color: #c8a0a0; }
    .voice-btn:hover { border-color: #b07a7a; color: #b07a7a; }
    .voice-btn.recording { border-color: #e74c3c; color: #e74c3c; animation: pulse-border 1s infinite; }
    @keyframes pulse-border { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    #voice-status { width: 100%; max-width: 640px; text-align: center; font-size: 0.85rem; color: #888; margin-top: 6px; min-height: 1.2em; }

    /* ---- Mobile / phone view ---- */
    @media (max-width: 600px) {
      body { padding: 56px 10px 20px; }
      #clock { font-size: 3.2rem; letter-spacing: 2px; }
      #date { font-size: 0.95rem; margin-bottom: 24px; }
      .item-content { padding: 8px 10px; gap: 6px; }
      .item-label { font-size: 0.9rem; min-width: 0; }
      .timer-display {
        min-width: 0;
        font-size: 0.75rem;
        display: flex;
        align-items: center;
        gap: 2px;
      }
      .time-input {
        width: 48px;
        font-size: 0.72rem;
        padding: 2px 3px;
      }
      .btn { padding: 4px 2px; font-size: 1rem; }
      .check-btn { font-size: 1rem; }
      .notes-area { padding: 0 10px 10px 36px; }
      .add-btn { font-size: 0.75rem; padding: 6px 8px; }
    }

    /* ---- Fullscreen toggle ---- */
    #fs-btn {
      position: fixed;
      top: 12px;
      right: 16px;
      background: none;
      border: 1px solid #ddd;
      border-radius: 6px;
      color: #aaa;
      cursor: pointer;
      font-size: 1rem;
      padding: 6px 10px;
      line-height: 1;
      transition: color 0.15s, border-color 0.15s;
      z-index: 100;
    }
    #fs-btn:hover { color: #555; border-color: #999; }

    /* ---- Auth ---- */
    #auth-bar {
      position: fixed;
      top: 12px;
      left: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 100;
    }
    #sign-in-btn {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      color: #555;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.85rem;
      padding: 6px 14px;
      transition: border-color 0.15s, color 0.15s;
    }
    #sign-in-btn:hover { border-color: #999; color: #222; }
    #user-info {
      display: none;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      color: #888;
    }
    #user-info img {
      width: 28px;
      height: 28px;
      border-radius: 50%;
    }
    #sign-out-btn {
      background: none;
      border: none;
      color: #aaa;
      cursor: pointer;
      font-size: 0.75rem;
      text-decoration: underline;
    }
    #sign-out-btn:hover { color: #555; }
    #sync-status {
      font-size: 0.75rem;
      color: #4ade80;
      margin-left: 4px;
      transition: opacity 0.3s;
    }
    #sync-status.error { color: #e74c3c; }
    #sync-status.local { color: #f0ad4e; }

    /* ---- Task List (Notion) ---- */
    #notion-section {
      width: 100%;
      max-width: 640px;
      margin-top: 32px;
    }
    #notion-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    #notion-header-left {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      user-select: none;
    }
    #notion-header-left h2 {
      font-size: 0.95rem;
      font-weight: 600;
      color: #666;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    #notion-toggle-wedge {
      color: #999;
      transition: transform 0.2s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 12px;
      height: 12px;
    }
    #notion-toggle-wedge svg { width: 100%; height: 100%; display: block; }
    #notion-toggle-wedge.collapsed { transform: rotate(-90deg); }
    #notion-header .notion-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .notion-action-btn {
      background: none;
      border: 1px solid #ddd;
      border-radius: 6px;
      color: #999;
      cursor: pointer;
      font-size: 0.8rem;
      padding: 4px 10px;
      font-family: inherit;
      transition: color 0.15s, border-color 0.15s;
    }
    .notion-action-btn:hover { color: #555; border-color: #999; }
    .notion-action-btn.archive { border-color: #a0b4c8; color: #a0b4c8; }
    .notion-action-btn.archive:hover { border-color: #7a96b0; color: #7a96b0; }
    .notion-action-btn.voice { border-color: #c8a0a0; color: #c8a0a0; }
    .notion-action-btn.voice:hover { border-color: #b07a7a; color: #b07a7a; }
    .notion-action-btn.voice.recording { border-color: #e74c3c; color: #e74c3c; border-style: solid; animation: pulse-border 1s infinite; }
    #notion-status { font-size: 0.75rem; color: #aaa; }
    #notion-voice-status { width: 100%; text-align: center; font-size: 0.85rem; color: #888; }
    #notion-voice-status:empty { display: none; }

    #notion-body { transition: max-height 0.3s ease, opacity 0.2s ease; overflow: hidden; }
    #notion-body.collapsed { max-height: 0 !important; opacity: 0; }

    #notion-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .notion-task {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: opacity 0.2s;
    }
    .notion-task.checked-done { background: #f0faf0; }
    .notion-task.checked-done .nt-title { color: #888; }
    .notion-task-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
    }
    .notion-task .nt-check {
      background: none;
      border: none;
      font-size: 1.1rem;
      cursor: pointer;
      color: #ccc;
      padding: 0;
      line-height: 1;
    }
    .notion-task .nt-check.done { color: #4ade80; }
    .notion-task .nt-title {
      flex: 1;
      font-size: 0.9rem;
      color: #333;
      border: none;
      background: none;
      font-family: inherit;
      outline: none;
    }
    .notion-task .nt-title:focus { border-bottom: 1px solid #4a90d9; }
    .notion-task .nt-due {
      font-size: 0.75rem;
      color: #999;
      white-space: nowrap;
    }
    .notion-task .nt-due.overdue { color: #e74c3c; }
    .notion-task .nt-notes-toggle {
      background: none;
      border: none;
      color: #bbb;
      cursor: pointer;
      padding: 2px 4px;
      transition: color 0.15s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .notion-task .nt-notes-toggle svg { width: 12px; height: 12px; display: block; }
    .notion-task .nt-notes-toggle:hover { color: #666; }
    .notion-task .nt-notes-toggle.has-content { color: #4a90d9; }
    .notion-task .nt-archive {
      background: none;
      border: none;
      color: #ccc;
      cursor: pointer;
      font-size: 0.9rem;
      padding: 2px;
      transition: color 0.15s;
    }
    .notion-task .nt-archive:hover { color: #e74c3c; }

    .nt-notes-area {
      display: none;
      padding: 0 14px 10px 42px;
    }
    .nt-notes-area.open { display: block; }
    .nt-notes-area .nt-notes-content {
      font-size: 0.85rem;
      color: #555;
      line-height: 1.6;
      min-height: 20px;
    }
    .nt-notes-area .nt-notes-content h3 { font-size: 1rem; margin: 8px 0 4px; color: #333; }
    .nt-notes-area .nt-notes-content h4 { font-size: 0.95rem; margin: 6px 0 3px; color: #333; }
    .nt-notes-area .nt-notes-content h5 { font-size: 0.9rem; margin: 4px 0 2px; color: #444; }
    .nt-notes-area .nt-notes-content div { margin: 2px 0; }
    .nt-notes-area .nt-notes-content code { background: #f0f0f0; padding: 1px 4px; border-radius: 3px; font-size: 0.8rem; }
    .nt-notes-area .nt-notes-content a { color: #4a90d9; text-decoration: none; }
    .nt-notes-area .nt-notes-content a:hover { text-decoration: underline; }
    .nt-notes-area .nt-todo-checkbox { cursor: pointer; margin-right: 4px; accent-color: #4ade80; }
    .nt-notes-area .nt-todo-block { display: flex; align-items: center; gap: 2px; }
    .nt-notes-area .nt-block-text { outline: none; border-radius: 3px; padding: 0 2px; }
    .nt-notes-area .nt-block-text:focus { background: #f5f9ff; box-shadow: 0 0 0 1px #c7dcf5; }
    .nt-notes-area .nt-block-text.saving { background: #fff8e1; }
    .nt-notes-area .nt-block-text.saved { background: #e8f7e8; transition: background 0.8s; }
    .nt-notes-area .nt-notes-loading {
      font-size: 0.8rem;
      color: #aaa;
      font-style: italic;
    }

    #notion-new-row {
      display: none;
      gap: 8px;
      margin-top: 6px;
    }
    #notion-new-row.open { display: flex; }
    #notion-new-input {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.9rem;
      outline: none;
    }
    #notion-new-input:focus { border-color: #4a90d9; }
    #notion-new-submit {
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      background: #4a90d9;
      color: #fff;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.85rem;
    }
    #notion-new-submit:hover { background: #3a7bc8; }
  </style>
</head>
<body>

<div id="auth-bar">
  <button id="sign-in-btn" onclick="signIn()">Sign in with Google</button>
  <div id="user-info">
    <img id="user-avatar" src="" alt="" />
    <span id="user-name"></span>
    <button id="sign-out-btn" onclick="signOut()">sign out</button>
  </div>
  <span id="sync-status"></span>
</div>
<button id="fs-btn" onclick="toggleFullscreen()" title="Toggle fullscreen">&#x26F6;</button>
<div id="clock">00:00:00</div>
<div id="date"></div>

<div id="list"></div>

<div id="add-row">
  <button class="add-btn voice-btn" id="voice-btn" onclick="toggleVoice()">+ Voice</button>
  <button class="add-btn" onclick="addTodo()">+ To-do</button>
  <button class="add-btn" onclick="addTimer()">+ Timer</button>
  <button class="add-btn archive-btn" onclick="archiveAllChecked()">Archive</button>
</div>
<div id="voice-status"></div>

<div id="notion-section">
  <div id="notion-header">
    <div id="notion-header-left" onclick="toggleNotionCollapse()">
      <span id="notion-toggle-wedge"><svg viewBox="0 0 10 6" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M1 1l4 4 4-4"/></svg></span>
      <h2>Task List</h2>
    </div>
    <div class="notion-actions" id="notion-actions">
      <span id="notion-status"></span>
      <button class="notion-action-btn voice" id="notion-voice-btn" onclick="toggleNotionVoice()">+ Voice</button>
      <button class="notion-action-btn" onclick="toggleNotionNew()">+ New</button>
      <button class="notion-action-btn" onclick="loadNotionTasks()">↻ Refresh</button>
      <button class="notion-action-btn archive" onclick="notionArchiveAllDone()">Archive</button>
    </div>
  </div>
  <div id="notion-body">
    <div id="notion-voice-status"></div>
    <div id="notion-list"></div>
    <div id="notion-new-row">
      <input id="notion-new-input" placeholder="New task..." onkeydown="if(event.key==='Enter')submitNotionNew()" />
      <button id="notion-new-submit" onclick="submitNotionNew()">Add</button>
    </div>
  </div>
</div>

<script>
// ──────────── Firebase Init ────────────
firebase.initializeApp({
  apiKey: "AIzaSyAl2npm6P_IXCM7HCjze9Agl9LRRJmP6cE",
  authDomain: "the-desk-b7e31.firebaseapp.com",
  projectId: "the-desk-b7e31",
  storageBucket: "the-desk-b7e31.firebasestorage.app",
  messagingSenderId: "745170698598",
  appId: "1:745170698598:web:6279f4856a4e35545888a7",
  measurementId: "G-Y7VRWY34E5"
});
const auth = firebase.auth();
const db = firebase.firestore();
let currentUser = null;

// ──────────── Auth ────────────
const provider = new firebase.auth.GoogleAuthProvider();

function signIn() { auth.signInWithPopup(provider); }
function signOut() { auth.signOut(); }

auth.onAuthStateChanged(user => {
  currentUser = user;
  const signInBtn = document.getElementById('sign-in-btn');
  const userInfo = document.getElementById('user-info');
  if (user) {
    signInBtn.style.display = 'none';
    userInfo.style.display = 'flex';
    document.getElementById('user-avatar').src = user.photoURL || '';
    document.getElementById('user-name').textContent = user.displayName || user.email;
    loadItems();
  } else {
    signInBtn.style.display = '';
    userInfo.style.display = 'none';
    loadItems();
  }
});

// ──────────── Clock & Date ────────────
function tickClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('en-US', { hour12: true, hour: 'numeric', minute: '2-digit' });
  const opts = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
  document.getElementById('date').textContent = now.toLocaleDateString('en-US', opts);
}
tickClock();
setInterval(tickClock, 1000);

// ──────────── Sync Status ────────────
function setSyncStatus(msg, type) {
  const el = document.getElementById('sync-status');
  el.textContent = msg;
  el.className = type || '';
  if (msg) setTimeout(() => {
    if (el.textContent === msg) el.textContent = '';
  }, 3000);
}

// ──────────── State ────────────
let items = [];
let _saveTimeout = null;

function save() {
  const data = items.map(i => {
    const clean = {};
    for (const [k, v] of Object.entries(i)) {
      if (!k.startsWith('_') && v !== undefined) clean[k] = v;
    }
    return clean;
  });

  // Always save to localStorage as backup
  localStorage.setItem('desktop-items', JSON.stringify(data));

  // Save to Firestore if signed in
  if (currentUser) {
    clearTimeout(_saveTimeout);
    _saveTimeout = setTimeout(() => {
      db.collection('users').doc(currentUser.uid).set({ items: data }, { merge: true })
        .then(() => setSyncStatus('☁ Saved', ''))
        .catch(err => { console.error('Firestore save error:', err); setSyncStatus('Save failed', 'error'); });
    }, 500);
  }
}

async function loadItems() {
  if (currentUser) {
    try {
      const doc = await db.collection('users').doc(currentUser.uid).get();
      if (doc.exists && doc.data().items) {
        items = doc.data().items;
        setSyncStatus('☁ Loaded from cloud', '');
      } else {
        // First sign-in: migrate localStorage data to Firestore
        items = JSON.parse(localStorage.getItem('desktop-items') || '[]');
        if (items.length > 0) {
          save();
          setSyncStatus('☁ Migrated to cloud', '');
        }
      }
    } catch (e) {
      console.error('Firestore load error:', e);
      items = JSON.parse(localStorage.getItem('desktop-items') || '[]');
      setSyncStatus('Cloud error — using local', 'error');
    }
  } else {
    items = JSON.parse(localStorage.getItem('desktop-items') || '[]');
    setSyncStatus('Local only — sign in to sync', 'local');
  }
  renderAll();
  resumeTimers();
}

// ──────────── Rendering ────────────
const listEl = document.getElementById('list');

// ── To-do ──
function renderTodo(item, idx) {
  if (!item.notes) item.notes = '';
  const row = document.createElement('div');
  row.className = 'item' + (item.checked ? ' checked' : '');
  row.dataset.idx = idx;

  row.innerHTML = `
    <div class="bar"></div>
    <div class="item-content">
      <button class="btn check-btn ${item.checked ? 'checked' : ''}" title="Toggle">${item.checked ? '&#10003;' : '&#9675;'}</button>
      <input class="item-label" value="${esc(item.label)}" placeholder="To-do..." />
      <button class="btn notes-toggle ${hasNotes(item) ? 'has-notes' : ''}" title="Notes"><svg viewBox="0 0 10 6" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M1 1l4 4 4-4"/></svg></button>
      <button class="btn delete-btn" title="Delete">&#10005;</button>
    </div>
    <div class="notes-area ${item._notesOpen ? 'open' : ''}">
      <div class="quill-editor"></div>
    </div>`;

  row.querySelector('.check-btn').onclick = () => { item.checked = !item.checked; save(); renderAll(); };
  row.querySelector('.item-label').addEventListener('input', e => { item.label = e.target.value; save(); });
  row.querySelector('.notes-toggle').onclick = () => { item._notesOpen = !item._notesOpen; renderAll(); };
  row.querySelector('.delete-btn').onclick = () => { archiveItem(idx); };
  if (item._notesOpen) initQuill(row, item);
  return row;
}

function updateNotesToggle(row, item) {
  const toggle = row.querySelector('.notes-toggle');
  const hasContent = item.notes && item.notes !== '' && item.notes !== '{"ops":[{"insert":"\\n"}]}';
  if (hasContent) toggle.classList.add('has-notes');
  else toggle.classList.remove('has-notes');
}

function initQuill(row, item) {
  const container = row.querySelector('.quill-editor');
  if (!container) return;
  const quill = new Quill(container, {
    theme: 'snow',
    placeholder: 'Add notes...',
    modules: {
      toolbar: [
        ['bold', 'italic', 'underline'],
        [{ list: 'bullet' }, { list: 'ordered' }, { list: 'check' }],
        ['clean']
      ]
    }
  });
  // Load content: support legacy plain text or Quill delta JSON
  if (item.notes) {
    try {
      const delta = JSON.parse(item.notes);
      if (delta.ops) { quill.setContents(delta); }
      else { quill.setText(item.notes); }
    } catch {
      // legacy plain text
      quill.setText(item.notes);
    }
  }
  // Save on change
  let saveTimer = null;
  quill.on('text-change', () => {
    item.notes = JSON.stringify(quill.getContents());
    updateNotesToggle(row, item);
    // debounce saves
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => save(), 500);
  });
  item._quill = quill;
}

// ── Timer ──
function renderTimer(item, idx) {
  if (!item.notes) item.notes = '';
  const row = document.createElement('div');
  const pct = item.totalSeconds > 0 ? Math.min(100, (item.elapsed / item.totalSeconds) * 100) : 0;
  const done = pct >= 100;
  row.className = 'item' + (done ? ' done' : '');
  row.dataset.idx = idx;

  const remaining = Math.max(0, item.totalSeconds - item.elapsed);

  row.innerHTML = `
    <div class="bar" style="width:${pct}%"></div>
    <div class="item-content">
      <button class="btn check-btn ${done ? 'checked' : ''}" title="${done ? 'Done' : 'Reset'}">
        ${done ? '&#10003;' : '&#9675;'}
      </button>
      <input class="item-label" value="${esc(item.label)}" placeholder="Timer label..." />
      <button class="btn play-btn" title="${item.running ? 'Pause' : 'Start'}">${item.running ? '&#9646;&#9646;' : '&#9654;'}</button>
      <div class="timer-display">
        <input class="time-input elapsed-input" value="${formatTime(item.elapsed)}" title="Elapsed time (mm:ss or hh:mm:ss)" /> / <input class="time-input" value="${formatTime(item.totalSeconds)}" title="Total time (mm:ss or hh:mm:ss)" />
      </div>
      <button class="btn notes-toggle ${hasNotes(item) ? 'has-notes' : ''}" title="Notes"><svg viewBox="0 0 10 6" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M1 1l4 4 4-4"/></svg></button>
      <button class="btn delete-btn" title="Delete">&#10005;</button>
    </div>
    <div class="notes-area ${item._notesOpen ? 'open' : ''}">
      <div class="quill-editor"></div>
    </div>`;

  row.querySelector('.item-label').addEventListener('input', e => { item.label = e.target.value; save(); });

  row.querySelector('.elapsed-input').addEventListener('change', e => {
    const s = parseTime(e.target.value);
    if (s !== null) {
      item.elapsed = Math.min(s, item.totalSeconds);
      save(); renderAll();
    }
  });

  row.querySelector('.time-input:not(.elapsed-input)').addEventListener('change', e => {
    const s = parseTime(e.target.value);
    if (s !== null) { item.totalSeconds = s; save(); renderAll(); }
  });

  row.querySelector('.notes-toggle').onclick = () => { item._notesOpen = !item._notesOpen; renderAll(); };
  if (item._notesOpen) initQuill(row, item);

  row.querySelector('.check-btn').onclick = () => { if (done) { item.elapsed = 0; item.running = false; stopInterval(item); save(); renderAll(); } };
  row.querySelector('.play-btn').onclick = () => { toggleTimer(item, idx); };
  row.querySelector('.delete-btn').onclick = () => { stopInterval(item); archiveItem(idx); };

  return row;
}

// ──────────── Bell sound ────────────
function playBell() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const frequencies = [523.25, 659.25, 783.99]; // C5, E5, G5
  frequencies.forEach((freq, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.3, ctx.currentTime + i * 0.15);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.15 + 0.8);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(ctx.currentTime + i * 0.15);
    osc.stop(ctx.currentTime + i * 0.15 + 0.8);
  });
}

// ──────────── Timer engine ────────────
const TICK = 250; // ms
const SAVE_INTERVAL = 5000; // auto-save every 5 seconds while a timer runs
let _autoSaveInterval = null;

function ensureAutoSave() {
  if (_autoSaveInterval) return;
  _autoSaveInterval = setInterval(() => {
    const anyRunning = items.some(i => i.type === 'timer' && i.running);
    if (anyRunning) {
      save();
    } else {
      clearInterval(_autoSaveInterval);
      _autoSaveInterval = null;
    }
  }, SAVE_INTERVAL);
}

function startInterval(item, idx) {
  if (item._interval) return;
  ensureAutoSave();
  item._lastTick = Date.now();
  item._interval = setInterval(() => {
    const now = Date.now();
    item.elapsed += (now - item._lastTick) / 1000;
    item._lastTick = now;
    if (item.elapsed >= item.totalSeconds) {
      item.elapsed = item.totalSeconds;
      item.running = false;
      stopInterval(item);
      save();
      renderAll();
      playBell();
      return;
    }
    // Update bar + display without full re-render
    const row = listEl.children[items.indexOf(item)];
    if (!row) return;
    const pct = (item.elapsed / item.totalSeconds) * 100;
    row.querySelector('.bar').style.width = pct + '%';
    const elapsedInput = row.querySelector('.elapsed-input');
    if (elapsedInput && elapsedInput !== document.activeElement) {
      elapsedInput.value = formatTime(item.elapsed);
    }
  }, TICK);
}

function stopInterval(item) {
  if (item._interval) { clearInterval(item._interval); item._interval = null; }
}

function toggleTimer(item, idx) {
  if (item.elapsed >= item.totalSeconds) return;
  item.running = !item.running;
  if (item.running) { startInterval(item, idx); }
  else { stopInterval(item); }
  save();
  renderAll();
}

// Resume any running timers on load
function resumeTimers() {
  items.forEach((item, idx) => {
    if (item.type === 'timer' && item.running) {
      startInterval(item, idx);
    }
  });
}

// ──────────── Helpers ────────────
function formatTime(sec) {
  sec = Math.round(sec);
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;
  if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function parseTime(str) {
  const parts = str.split(':').map(Number);
  if (parts.some(isNaN)) return null;
  if (parts.length === 3) return parts[0]*3600 + parts[1]*60 + parts[2];
  if (parts.length === 2) return parts[0]*60 + parts[1];
  if (parts.length === 1) return parts[0]*60; // treat bare number as minutes
  return null;
}

function esc(s) { return (s || '').replace(/"/g, '&quot;').replace(/</g, '&lt;'); }

function hasNotes(item) {
  if (!item.notes || item.notes === '') return false;
  try {
    const delta = JSON.parse(item.notes);
    if (delta.ops) return delta.ops.some(op => typeof op.insert === 'string' ? op.insert.trim() !== '' : true);
  } catch {}
  return item.notes.trim() !== '';
}

function addTodo() {
  items.push({ type: 'todo', label: '', checked: false, notes: '' });
  save(); renderAll();
  listEl.querySelector('.item:last-of-type .item-label').focus();
}

function addTimer() {
  items.push({ type: 'timer', label: '', totalSeconds: 1500, elapsed: 0, running: false, notes: '' });
  save(); renderAll();
  listEl.querySelector('.item:last-of-type .item-label').focus();
}

function archiveItem(idx) {
  const item = items.splice(idx, 1)[0];
  stopInterval(item);
  const archived = { ...item, archivedAt: new Date().toISOString() };
  delete archived._interval; delete archived._lastTick; delete archived._notesOpen; delete archived._quill;
  saveArchive([archived]);
  save(); renderAll();
}

function archiveAllChecked() {
  const isDone = i => (i.type === 'todo' && i.checked) || (i.type === 'timer' && i.totalSeconds > 0 && i.elapsed >= i.totalSeconds);
  const done = items.filter(isDone);
  if (done.length === 0) return;
  done.forEach(i => { if (i._interval) stopInterval(i); });
  const toArchive = done.map(i => {
    const a = { ...i, archivedAt: new Date().toISOString() };
    delete a._interval; delete a._lastTick; delete a._notesOpen; delete a._quill;
    return a;
  });
  saveArchive(toArchive);
  items = items.filter(i => !isDone(i));
  save(); renderAll();
}

function saveArchive(archivedItems) {
  if (!currentUser) return;
  const ref = db.collection('users').doc(currentUser.uid).collection('archive');
  archivedItems.forEach(item => {
    const clean = JSON.parse(JSON.stringify(item));
    ref.add(clean);
  });
}

// ──────────── Drag & Drop reorder ────────────
let dragIdx = null;
let dropIndicator = null;

function getDropIndicator() {
  if (!dropIndicator) {
    dropIndicator = document.createElement('div');
    dropIndicator.className = 'drop-indicator';
  }
  return dropIndicator;
}

function renderAll() {
  listEl.innerHTML = '';
  items.forEach((item, idx) => {
    listEl.appendChild(item.type === 'timer' ? renderTimer(item, idx) : renderTodo(item, idx));
  });
  // attach drag listeners to the list container
  setupDragOnList();
}

function setupDragOnList() {
  const rows = listEl.querySelectorAll('.item');
  rows.forEach(row => {
    row.setAttribute('draggable', true);

    row.addEventListener('dragstart', e => {
      // Don't drag when clicking buttons or inputs
      if (e.target.closest('button, input, .notes-area')) {
        e.preventDefault();
        return;
      }
      dragIdx = Number(row.dataset.idx);
      e.dataTransfer.effectAllowed = 'move';
      requestAnimationFrame(() => row.classList.add('dragging'));
    });

    row.addEventListener('dragend', () => {
      row.classList.remove('dragging');
      dragIdx = null;
      const ind = getDropIndicator();
      ind.classList.remove('visible');
      if (ind.parentNode) ind.parentNode.removeChild(ind);
    });
  });

  // Use the list container for dragover/drop so the indicator works between items
  listEl.ondragover = e => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    if (dragIdx === null) return;

    const ind = getDropIndicator();
    const children = [...listEl.querySelectorAll('.item')];
    let insertBefore = null;

    for (const child of children) {
      const rect = child.getBoundingClientRect();
      if (e.clientY < rect.top + rect.height / 2) {
        insertBefore = child;
        break;
      }
    }

    if (insertBefore) {
      listEl.insertBefore(ind, insertBefore);
    } else {
      listEl.appendChild(ind);
    }
    ind.classList.add('visible');
  };

  listEl.ondragleave = e => {
    // only hide if leaving the list entirely
    if (!listEl.contains(e.relatedTarget)) {
      const ind = getDropIndicator();
      ind.classList.remove('visible');
    }
  };

  listEl.ondrop = e => {
    e.preventDefault();
    const ind = getDropIndicator();
    ind.classList.remove('visible');
    if (dragIdx === null) return;

    // figure out where the indicator is
    const children = [...listEl.querySelectorAll('.item')];
    let dropIdx = children.length; // default: end
    for (let i = 0; i < children.length; i++) {
      const rect = children[i].getBoundingClientRect();
      if (e.clientY < rect.top + rect.height / 2) {
        dropIdx = i;
        break;
      }
    }

    // adjust for the fact we're removing from the original position
    const [moved] = items.splice(dragIdx, 1);
    const insertAt = dropIdx > dragIdx ? dropIdx - 1 : dropIdx;
    items.splice(insertAt, 0, moved);
    dragIdx = null;
    if (ind.parentNode) ind.parentNode.removeChild(ind);
    save(); renderAll();
  };
}

// ──────────── Voice Recording ────────────
let mediaRecorder = null;
let audioChunks = [];
const voiceBtn = document.getElementById('voice-btn');
const voiceStatus = document.getElementById('voice-status');

function toggleVoice() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    stopVoice();
  } else {
    startVoice();
  }
}

async function startVoice() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioChunks = [];
    mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
    mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      stream.getTracks().forEach(t => t.stop());
      sendVoice(new Blob(audioChunks, { type: 'audio/webm' }));
    };
    mediaRecorder.start();
    voiceBtn.textContent = 'Stop';
    voiceBtn.classList.add('recording');
    voiceStatus.textContent = 'Recording...';
  } catch (err) {
    voiceStatus.textContent = 'Mic access denied';
    console.error('Mic error:', err);
  }
}

function stopVoice() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
    voiceBtn.textContent = '+ Voice';
    voiceBtn.classList.remove('recording');
    voiceStatus.textContent = 'Processing...';
  }
}

async function sendVoice(blob) {
  try {
    const form = new FormData();
    form.append('audio', blob, 'recording.webm');
    const resp = await fetch('/api/voice', { method: 'POST', body: form });
    const data = await resp.json();
    if (data.error) throw new Error(data.error);
    if (data.tasks && data.tasks.length > 0) {
      data.tasks.forEach(t => items.push(t));
      save();
      renderAll();
      voiceStatus.textContent = `Added ${data.tasks.length} task${data.tasks.length > 1 ? 's' : ''}`;
    } else {
      voiceStatus.textContent = 'No tasks found in recording';
    }
    setTimeout(() => { voiceStatus.textContent = ''; }, 3000);
  } catch (err) {
    voiceStatus.textContent = 'Error: ' + err.message;
    console.error('Voice error:', err);
    setTimeout(() => { voiceStatus.textContent = ''; }, 5000);
  }
}

// ──────────── Notion Tasks ────────────
let notionTasks = [];
let notionCollapsed = false;
const notionListEl = document.getElementById('notion-list');
const notionStatusEl = document.getElementById('notion-status');

// ── Collapse/Expand ──
function toggleNotionCollapse() {
  notionCollapsed = !notionCollapsed;
  document.getElementById('notion-body').classList.toggle('collapsed', notionCollapsed);
  document.getElementById('notion-toggle-wedge').classList.toggle('collapsed', notionCollapsed);
  document.getElementById('notion-actions').style.display = notionCollapsed ? 'none' : 'flex';
}

// ── Load ──
async function loadNotionTasks() {
  notionStatusEl.textContent = 'Loading...';
  try {
    const resp = await fetch('/api/notion');
    const data = await resp.json();
    if (data.error) throw new Error(data.error);
    notionTasks = data.tasks || [];
    renderNotionTasks();
    notionStatusEl.textContent = '';
  } catch (err) {
    console.error('Notion load error:', err);
    notionStatusEl.textContent = 'Error loading';
    setTimeout(() => { notionStatusEl.textContent = ''; }, 3000);
  }
}

// ── Render ──
function renderNotionTasks() {
  notionListEl.innerHTML = '';
  if (notionTasks.length === 0) {
    notionListEl.innerHTML = '<div style="text-align:center;color:#bbb;font-size:0.85rem;padding:16px;">No open tasks</div>';
    return;
  }
  notionTasks.forEach(task => {
    const row = document.createElement('div');
    const isDone = task.doneStatus === 'Done';
    row.className = 'notion-task' + (isDone ? ' checked-done' : '');

    const dueStr = task.due ? formatDue(task.due) : '';
    const isOverdue = task.due && new Date(task.due) < new Date() && !isDone;
    const hasContent = task._contentLoaded && task._content;

    row.innerHTML = `
      <div class="notion-task-row">
        <button class="nt-check ${isDone ? 'done' : ''}" title="${isDone ? 'Uncheck' : 'Mark done'}">${isDone ? '✓' : '○'}</button>
        <input class="nt-title" value="${esc(task.title)}" />
        ${dueStr ? `<span class="nt-due ${isOverdue ? 'overdue' : ''}">${dueStr}</span>` : ''}
        <button class="nt-notes-toggle ${hasContent ? 'has-content' : ''}" title="Notes"><svg viewBox="0 0 10 6" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M1 1l4 4 4-4"/></svg></button>
        <button class="nt-archive" title="Remove">✕</button>
      </div>
      <div class="nt-notes-area ${task._notesOpen ? 'open' : ''}">
        <div class="${task._contentLoaded ? 'nt-notes-content' : 'nt-notes-loading'}">
          ${task._contentLoaded ? (task._content || '<em style="color:#ccc">No content</em>') : 'Loading...'}
        </div>
      </div>
    `;

    row.querySelector('.nt-check').onclick = () => notionToggleDone(task);
    row.querySelector('.nt-archive').onclick = () => notionArchive(task, row);
    row.querySelector('.nt-notes-toggle').onclick = () => {
      task._notesOpen = !task._notesOpen;
      if (task._notesOpen && !task._contentLoaded) fetchNotionContent(task);
      else renderNotionTasks();
    };

    let titleTimer = null;
    row.querySelector('.nt-title').addEventListener('input', e => {
      clearTimeout(titleTimer);
      titleTimer = setTimeout(() => notionUpdateTitle(task, e.target.value), 800);
    });

    notionListEl.appendChild(row);
  });
  // Wire up any checkboxes in already-loaded notes
  setTimeout(() => wireNotionCheckboxes(), 0);
}

// ── Fetch page content ──
async function fetchNotionContent(task) {
  try {
    const resp = await fetch('/api/notion', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'get_content', id: task.id })
    });
    const data = await resp.json();
    task._content = data.content || '';
    task._contentLoaded = true;
    renderNotionTasks();
    wireNotionCheckboxes(task);
  } catch (err) {
    console.error('Notion content error:', err);
    task._content = 'Error loading content';
    task._contentLoaded = true;
    renderNotionTasks();
  }
}

function wireNotionCheckboxes(task) {
  // Find all checkboxes in the notes area and attach toggle handlers
  const checkboxes = notionListEl.querySelectorAll(`.nt-todo-checkbox`);
  checkboxes.forEach(cb => {
    if (cb._wired) return;
    cb._wired = true;
    cb.addEventListener('change', async (e) => {
      const blockId = cb.dataset.blockId;
      const checked = cb.checked;
      // Update visual immediately
      const row = cb.closest('.nt-todo-block');
      if (row) {
        row.style.color = checked ? '#999' : '';
        row.style.textDecoration = checked ? 'line-through' : '';
      }
      try {
        await fetch('/api/notion', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'toggle_block_todo', block_id: blockId, checked: checked })
        });
      } catch (err) {
        console.error('Toggle todo error:', err);
        cb.checked = !checked; // revert
      }
    });
  });

  // Wire editable block text (contenteditable spans)
  const editables = notionListEl.querySelectorAll('.nt-block-text');
  editables.forEach(el => {
    if (el._wired) return;
    el._wired = true;
    el._lastSaved = el.textContent.replace(/\u200B/g, '');

    const save = async () => {
      const text = el.textContent.replace(/\u200B/g, '');
      if (text === el._lastSaved) return;
      const blockId = el.dataset.blockId;
      const blockType = el.dataset.blockType;
      el.classList.add('saving');
      try {
        const resp = await fetch('/api/notion', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'update_block', block_id: blockId, block_type: blockType, text })
        });
        const data = await resp.json();
        el.classList.remove('saving');
        if (data.ok) {
          el._lastSaved = text;
          el.classList.add('saved');
          setTimeout(() => el.classList.remove('saved'), 800);
        } else {
          el.classList.add('error');
          console.error('Block save error:', data);
        }
      } catch (err) {
        el.classList.remove('saving');
        console.error('Block save error:', err);
      }
    };

    let debounceTimer = null;
    el.addEventListener('input', () => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(save, 900);
    });
    el.addEventListener('blur', () => {
      clearTimeout(debounceTimer);
      save();
    });
    el.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        el.blur();
      }
      if (e.key === 'Escape') {
        el.textContent = el._lastSaved;
        el.blur();
      }
    });
  });
}

function formatDue(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const today = new Date();
  today.setHours(0,0,0,0);
  const diff = Math.floor((d - today) / 86400000);
  if (diff === 0) return 'Today';
  if (diff === 1) return 'Tomorrow';
  if (diff === -1) return 'Yesterday';
  if (diff > 1 && diff <= 7) return d.toLocaleDateString('en-US', { weekday: 'short' });
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

// ── Toggle Done ──
async function notionToggleDone(task) {
  const newStatus = task.doneStatus === 'Done' ? 'Not started' : 'Done';
  task.doneStatus = newStatus;
  renderNotionTasks();
  try {
    await fetch('/api/notion', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'update', id: task.id, updates: { status: newStatus } })
    });
  } catch (err) {
    console.error('Notion toggle error:', err);
    task.doneStatus = newStatus === 'Done' ? 'Not started' : 'Done';
    renderNotionTasks();
  }
}

// ── Archive All Done ──
async function notionArchiveAllDone() {
  const doneTasks = notionTasks.filter(t => t.doneStatus === 'Done');
  if (doneTasks.length === 0) return;
  notionStatusEl.textContent = `Archiving ${doneTasks.length}...`;
  try {
    await Promise.all(doneTasks.map(task =>
      fetch('/api/notion', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'complete', id: task.id })
      })
    ));
    notionTasks = notionTasks.filter(t => t.doneStatus !== 'Done');
    renderNotionTasks();
    notionStatusEl.textContent = '';
  } catch (err) {
    console.error('Notion archive all error:', err);
    notionStatusEl.textContent = 'Error archiving';
    setTimeout(() => { notionStatusEl.textContent = ''; }, 3000);
  }
}

// ── Archive single ──
async function notionArchive(task, row) {
  row.style.opacity = '0.3';
  try {
    await fetch('/api/notion', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'archive', id: task.id })
    });
    notionTasks = notionTasks.filter(t => t.id !== task.id);
    renderNotionTasks();
  } catch (err) {
    console.error('Notion archive error:', err);
    row.style.opacity = '1';
  }
}

// ── Update title ──
async function notionUpdateTitle(task, newTitle) {
  try {
    await fetch('/api/notion', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'update', id: task.id, updates: { title: newTitle } })
    });
    task.title = newTitle;
  } catch (err) {
    console.error('Notion update error:', err);
  }
}

// ── New task ──
function toggleNotionNew() {
  const row = document.getElementById('notion-new-row');
  row.classList.toggle('open');
  if (row.classList.contains('open')) {
    document.getElementById('notion-new-input').focus();
  }
}

async function submitNotionNew() {
  const input = document.getElementById('notion-new-input');
  const title = input.value.trim();
  if (!title) return;
  input.value = '';
  notionStatusEl.textContent = 'Adding...';
  try {
    const resp = await fetch('/api/notion', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'create', title: title })
    });
    const data = await resp.json();
    if (data.error) throw new Error(data.error);
    notionTasks.unshift(data);
    renderNotionTasks();
    notionStatusEl.textContent = '';
  } catch (err) {
    console.error('Notion create error:', err);
    notionStatusEl.textContent = 'Error adding task';
    setTimeout(() => { notionStatusEl.textContent = ''; }, 3000);
  }
}

// ──────────── Notion Voice ────────────
let notionMediaRecorder = null;
let notionAudioChunks = [];
const notionVoiceBtn = document.getElementById('notion-voice-btn');
const notionVoiceStatus = document.getElementById('notion-voice-status');

function toggleNotionVoice() {
  if (notionMediaRecorder && notionMediaRecorder.state === 'recording') {
    stopNotionVoice();
  } else {
    startNotionVoice();
  }
}

async function startNotionVoice() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    notionAudioChunks = [];
    notionMediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
    notionMediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) notionAudioChunks.push(e.data); };
    notionMediaRecorder.onstop = () => {
      stream.getTracks().forEach(t => t.stop());
      sendNotionVoice(new Blob(notionAudioChunks, { type: 'audio/webm' }));
    };
    notionMediaRecorder.start();
    notionVoiceBtn.textContent = '⏹ Stop';
    notionVoiceBtn.classList.add('recording');
    notionVoiceStatus.textContent = 'Recording...';
  } catch (err) {
    notionVoiceStatus.textContent = 'Mic access denied';
    console.error('Mic error:', err);
  }
}

function stopNotionVoice() {
  if (notionMediaRecorder && notionMediaRecorder.state === 'recording') {
    notionMediaRecorder.stop();
    notionVoiceBtn.textContent = '+ Voice';
    notionVoiceBtn.classList.remove('recording');
    notionVoiceStatus.textContent = 'Processing...';
  }
}

async function sendNotionVoice(blob) {
  try {
    const form = new FormData();
    form.append('audio', blob, 'recording.webm');
    const resp = await fetch('/api/voice', { method: 'POST', body: form });
    const data = await resp.json();
    if (data.error) throw new Error(data.error);
    if (data.tasks && data.tasks.length > 0) {
      // Create each task in Notion
      notionVoiceStatus.textContent = `Creating ${data.tasks.length} task(s) in Notion...`;
      for (const t of data.tasks) {
        try {
          const resp = await fetch('/api/notion', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'create', title: t.label })
          });
          const created = await resp.json();
          if (!created.error) notionTasks.unshift(created);
        } catch (e) { console.error('Create error:', e); }
      }
      renderNotionTasks();
      notionVoiceStatus.textContent = `Added ${data.tasks.length} task(s)`;
    } else {
      notionVoiceStatus.textContent = 'No tasks found in recording';
    }
    setTimeout(() => { notionVoiceStatus.textContent = ''; }, 3000);
  } catch (err) {
    notionVoiceStatus.textContent = 'Error: ' + err.message;
    console.error('Notion voice error:', err);
    setTimeout(() => { notionVoiceStatus.textContent = ''; }, 5000);
  }
}

// ──────────── Init ────────────
loadItems();
loadNotionTasks();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
