<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Desktop</title>
  <link href="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.snow.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 56px 20px 40px;
    }

    /* ---- Clock & Date ---- */
    #clock {
      font-size: 5rem;
      font-weight: 200;
      letter-spacing: 4px;
      color: #fff;
    }
    #date {
      font-size: 1.15rem;
      color: #8888aa;
      margin-top: 4px;
      margin-bottom: 48px;
    }

    /* ---- List container ---- */
    #list {
      width: 100%;
      max-width: 640px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* ---- Shared item row ---- */
    .item {
      position: relative;
      background: #16213e;
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 52px;
      cursor: grab;
    }
    .item.dragging { opacity: 0.4; cursor: grabbing; }

    /* ---- Drag indicator ---- */
    .drop-indicator {
      height: 3px;
      background: #4a90d9;
      border-radius: 2px;
      margin: -2px 0;
      pointer-events: none;
      display: none;
    }
    .drop-indicator.visible { display: block; }

    /* ---- Timer bar background fill ---- */
    .item .bar {
      position: absolute;
      inset: 0;
      background: #0f3460;
      width: 0%;
      transition: width 0.25s linear;
      pointer-events: none;
      border-radius: 10px;
    }
    .item.done .bar { background: #1a5c3a; }

    /* ---- Checked to-do ---- */
    .item.checked .bar { width: 100% !important; background: #1a5c3a; }
    .item.checked .check-btn { color: #4ade80; }
    .item.checked .item-label { text-decoration: line-through; color: #666; }

    /* ---- Item content sits above bar ---- */
    .item-content {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      width: 100%;
      padding: 10px 14px;
      gap: 10px;
    }

    .item-label {
      flex: 1;
      font-size: 0.95rem;
      outline: none;
      background: none;
      border: none;
      color: #e0e0e0;
      font-family: inherit;
    }
    .item-label::placeholder { color: #555; }

    /* ---- Timer display ---- */
    .timer-display {
      font-variant-numeric: tabular-nums;
      font-size: 0.85rem;
      color: #aaa;
      white-space: nowrap;
      min-width: 100px;
      text-align: right;
    }

    /* ---- Buttons ---- */
    .btn {
      background: none;
      border: none;
      color: #888;
      cursor: pointer;
      font-size: 1.05rem;
      padding: 4px;
      line-height: 1;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
    }
    .btn:hover { color: #fff; background: rgba(255,255,255,0.08); }

    .check-btn { font-size: 1.1rem; }
    .check-btn.checked { color: #4ade80; }

    /* ---- Time input (for setting duration) ---- */
    .time-input {
      width: 64px;
      background: rgba(255,255,255,0.06);
      border: 1px solid #333;
      border-radius: 6px;
      color: #e0e0e0;
      font-family: inherit;
      font-size: 0.85rem;
      padding: 3px 6px;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }
    .time-input:focus { border-color: #0f3460; outline: none; }

    /* ---- Notes area ---- */
    .notes-toggle {
      background: none;
      border: none;
      color: #555;
      cursor: pointer;
      font-size: 0.75rem;
      padding: 2px 4px;
      transition: color 0.15s;
    }
    .notes-toggle:hover { color: #aaa; }
    .notes-toggle.has-notes { color: #4a90d9; }

    .notes-area {
      display: none;
      position: relative;
      z-index: 1;
      padding: 0 14px 10px 42px;
    }
    .notes-area.open { display: block; }

    /* ---- Quill overrides (dark) ---- */
    .notes-area .ql-toolbar {
      border: 1px solid #333;
      border-radius: 6px 6px 0 0;
      background: #1a1a2e;
      padding: 4px 6px;
    }
    .notes-area .ql-toolbar .ql-stroke { stroke: #888; }
    .notes-area .ql-toolbar .ql-fill { fill: #888; }
    .notes-area .ql-toolbar .ql-picker-label { color: #888; }
    .notes-area .ql-toolbar button:hover .ql-stroke { stroke: #fff; }
    .notes-area .ql-toolbar button:hover .ql-fill { fill: #fff; }
    .notes-area .ql-container {
      border: 1px solid #333;
      border-top: none;
      border-radius: 0 0 6px 6px;
      background: #16213e;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 0.85rem;
      color: #ccc;
      min-height: 60px;
    }
    .notes-area .ql-editor {
      min-height: 60px;
      padding: 8px;
    }
    .notes-area .ql-editor.ql-blank::before {
      color: #555;
      font-style: normal;
    }

    /* ---- Add buttons row ---- */
    #add-row {
      width: 100%;
      max-width: 640px;
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }
    .add-btn {
      flex: 1;
      padding: 12px;
      border: 2px dashed #2a2a4a;
      border-radius: 10px;
      background: none;
      color: #666;
      font-family: inherit;
      font-size: 0.9rem;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .add-btn:hover { border-color: #444; color: #aaa; }

    /* ---- Fullscreen toggle ---- */
    #fs-btn {
      position: fixed;
      bottom: 12px;
      right: 16px;
      background: none;
      border: 1px solid #333;
      border-radius: 6px;
      color: #555;
      cursor: pointer;
      font-size: 1rem;
      padding: 6px 10px;
      line-height: 1;
      transition: color 0.15s, border-color 0.15s;
      z-index: 100;
    }
    #fs-btn:hover { color: #aaa; border-color: #555; }

    /* ---- Auth bar ---- */
    #auth-bar {
      position: fixed;
      top: 0;
      right: 0;
      left: 0;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 8px 16px;
      gap: 10px;
      z-index: 100;
      background: rgba(26,26,46,0.85);
      backdrop-filter: blur(6px);
    }
    #auth-bar .user-name {
      font-size: 0.82rem;
      color: #8888aa;
    }
    #auth-bar button {
      background: none;
      border: 1px solid #444;
      color: #ccc;
      font-family: inherit;
      font-size: 0.82rem;
      padding: 5px 14px;
      border-radius: 6px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    #auth-bar button:hover { border-color: #888; color: #fff; }
    #auth-bar .google-btn {
      border-color: #4285f4;
      color: #4285f4;
    }
    #auth-bar .google-btn:hover {
      background: rgba(66,133,244,0.1);
      color: #6ea5ff;
    }
    #sync-status {
      font-size: 0.75rem;
      color: #555;
    }
  </style>
</head>
<body>

<div id="auth-bar">
  <span id="sync-status"></span>
  <span class="user-name" id="user-name"></span>
  <button class="google-btn" id="sign-in-btn" onclick="signInWithGoogle()" style="display:none">Sign in with Google</button>
  <button id="sign-out-btn" onclick="signOutUser()" style="display:none">Sign out</button>
</div>

<button id="fs-btn" onclick="toggleFullscreen()" title="Toggle fullscreen">&#x26F6;</button>
<div id="clock">00:00:00</div>
<div id="date"></div>

<div id="list"></div>

<div id="add-row">
  <button class="add-btn" onclick="addTodo()">+ To-do</button>
  <button class="add-btn" onclick="addTimer()">+ Timer</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
// ──────────── Firebase Setup ────────────
firebase.initializeApp({
  apiKey: "AIzaSyAl2npm6P_IXCM7HCjze9Agl9LRRJmP6cE",
  authDomain: "the-desk-b7e31.firebaseapp.com",
  projectId: "the-desk-b7e31",
  storageBucket: "the-desk-b7e31.firebasestorage.app",
  messagingSenderId: "745170698598",
  appId: "1:745170698598:web:6279f4856a4e35545888a7",
  measurementId: "G-Y7VRWY34E5"
});

const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;
let unsubFirestore = null;

function setSyncStatus(msg) {
  document.getElementById('sync-status').textContent = msg;
  if (msg) setTimeout(() => {
    const el = document.getElementById('sync-status');
    if (el && el.textContent === msg) el.textContent = '';
  }, 2000);
}

// ──────────── Auth ────────────
function signInWithGoogle() {
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).catch(err => console.error('Auth error:', err));
}

function signOutUser() {
  auth.signOut();
}

auth.onAuthStateChanged(user => {
  currentUser = user;
  document.getElementById('sign-in-btn').style.display = user ? 'none' : '';
  document.getElementById('sign-out-btn').style.display = user ? '' : 'none';
  document.getElementById('user-name').textContent = user ? user.displayName : '';

  // Clean up previous listener
  if (unsubFirestore) { unsubFirestore(); unsubFirestore = null; }

  if (user) {
    // Load from Firestore & listen for changes
    const docRef = db.collection('users').doc(user.uid);
    unsubFirestore = docRef.onSnapshot(doc => {
      if (doc.exists && doc.data().items) {
        // Stop running timers before replacing state
        items.forEach(i => { if (i._interval) stopInterval(i); });
        items = doc.data().items;
        renderAll();
        resumeTimers();
        setSyncStatus('Synced');
      }
    });
  } else {
    // Fall back to localStorage
    items = JSON.parse(localStorage.getItem('desktop-items') || '[]');
    renderAll();
    resumeTimers();
  }
});

// ──────────── Clock & Date ────────────
function tickClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('en-US', { hour12: false });
  const opts = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
  document.getElementById('date').textContent = now.toLocaleDateString('en-US', opts);
}
tickClock();
setInterval(tickClock, 1000);

// ──────────── State ────────────
let items = [];

let _saveTimeout = null;
function save() {
  const clean = items.map(i => ({
    ...i,
    _interval: undefined,
    _lastTick: undefined,
    _notesOpen: undefined,
    _quill: undefined,
  }));

  // Always save to localStorage as backup
  localStorage.setItem('desktop-items', JSON.stringify(clean));

  // Debounced save to Firestore
  if (currentUser) {
    clearTimeout(_saveTimeout);
    _saveTimeout = setTimeout(() => {
      db.collection('users').doc(currentUser.uid).set({ items: clean }, { merge: true })
        .then(() => setSyncStatus('Saved'))
        .catch(err => { console.error('Firestore save error:', err); setSyncStatus('Save failed'); });
    }, 500);
  }
}

// ──────────── Rendering ────────────
const listEl = document.getElementById('list');

// ── To-do ──
function renderTodo(item, idx) {
  if (!item.notes) item.notes = '';
  const row = document.createElement('div');
  row.className = 'item' + (item.checked ? ' checked' : '');
  row.dataset.idx = idx;

  row.innerHTML = `
    <div class="bar"></div>
    <div class="item-content">
      <button class="btn check-btn ${item.checked ? 'checked' : ''}" title="Toggle">${item.checked ? '&#10003;' : '&#9675;'}</button>
      <input class="item-label" value="${esc(item.label)}" placeholder="To-do..." />
      <button class="btn notes-toggle ${hasNotes(item) ? 'has-notes' : ''}" title="Notes">&#9660;</button>
      <button class="btn" title="Delete">&#10005;</button>
    </div>
    <div class="notes-area ${item._notesOpen ? 'open' : ''}">
      <div class="quill-editor"></div>
    </div>`;

  row.querySelector('.check-btn').onclick = () => { item.checked = !item.checked; save(); renderAll(); };
  row.querySelector('.item-label').addEventListener('input', e => { item.label = e.target.value; save(); });
  row.querySelector('.notes-toggle').onclick = () => { item._notesOpen = !item._notesOpen; renderAll(); };
  row.querySelector('.item-content > .btn:last-child').onclick = () => { removeItem(idx); };
  if (item._notesOpen) initQuill(row, item);
  return row;
}

function updateNotesToggle(row, item) {
  const toggle = row.querySelector('.notes-toggle');
  const hasContent = item.notes && item.notes !== '' && item.notes !== '{"ops":[{"insert":"\\n"}]}';
  if (hasContent) toggle.classList.add('has-notes');
  else toggle.classList.remove('has-notes');
}

function initQuill(row, item) {
  const container = row.querySelector('.quill-editor');
  if (!container) return;
  const quill = new Quill(container, {
    theme: 'snow',
    placeholder: 'Add notes...',
    modules: {
      toolbar: [
        ['bold', 'italic', 'underline'],
        [{ list: 'bullet' }, { list: 'ordered' }, { list: 'check' }],
        ['clean']
      ]
    }
  });
  if (item.notes) {
    try {
      const delta = JSON.parse(item.notes);
      if (delta.ops) { quill.setContents(delta); }
      else { quill.setText(item.notes); }
    } catch {
      quill.setText(item.notes);
    }
  }
  let saveTimer = null;
  quill.on('text-change', () => {
    item.notes = JSON.stringify(quill.getContents());
    updateNotesToggle(row, item);
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => save(), 500);
  });
  item._quill = quill;
}

// ── Timer ──
function renderTimer(item, idx) {
  if (!item.notes) item.notes = '';
  const row = document.createElement('div');
  const pct = item.totalSeconds > 0 ? Math.min(100, (item.elapsed / item.totalSeconds) * 100) : 0;
  const done = pct >= 100;
  row.className = 'item' + (done ? ' done' : '');
  row.dataset.idx = idx;

  const remaining = Math.max(0, item.totalSeconds - item.elapsed);

  row.innerHTML = `
    <div class="bar" style="width:${pct}%"></div>
    <div class="item-content">
      <button class="btn check-btn ${done ? 'checked' : ''}" title="${done ? 'Done' : 'Reset'}">
        ${done ? '&#10003;' : '&#9675;'}
      </button>
      <input class="item-label" value="${esc(item.label)}" placeholder="Timer label..." />
      <div class="timer-display">
        <input class="time-input elapsed-input" value="${formatTime(item.elapsed)}" title="Elapsed time (mm:ss or hh:mm:ss)" /> / <input class="time-input" value="${formatTime(item.totalSeconds)}" title="Total time (mm:ss or hh:mm:ss)" />
      </div>
      <button class="btn" title="${item.running ? 'Pause' : 'Start'}">${item.running ? '&#9646;&#9646;' : '&#9654;'}</button>
      <button class="btn" title="Reset">&#8634;</button>
      <button class="btn notes-toggle ${hasNotes(item) ? 'has-notes' : ''}" title="Notes">&#9660;</button>
      <button class="btn" title="Delete">&#10005;</button>
    </div>
    <div class="notes-area ${item._notesOpen ? 'open' : ''}">
      <div class="quill-editor"></div>
    </div>`;

  row.querySelector('.item-label').addEventListener('input', e => { item.label = e.target.value; save(); });

  row.querySelector('.elapsed-input').addEventListener('change', e => {
    const s = parseTime(e.target.value);
    if (s !== null) {
      item.elapsed = Math.min(s, item.totalSeconds);
      save(); renderAll();
    }
  });

  row.querySelector('.time-input:not(.elapsed-input)').addEventListener('change', e => {
    const s = parseTime(e.target.value);
    if (s !== null) { item.totalSeconds = s; save(); renderAll(); }
  });

  row.querySelector('.notes-toggle').onclick = () => { item._notesOpen = !item._notesOpen; renderAll(); };
  if (item._notesOpen) initQuill(row, item);

  const btns = row.querySelectorAll('.item-content > .btn');
  btns[0].onclick = () => { if (done) { item.elapsed = 0; item.running = false; stopInterval(item); save(); renderAll(); } };
  btns[1].onclick = () => { toggleTimer(item, idx); };
  btns[2].onclick = () => { item.elapsed = 0; item.running = false; stopInterval(item); save(); renderAll(); };
  btns[4].onclick = () => { stopInterval(item); removeItem(idx); };

  return row;
}

// ──────────── Bell sound ────────────
function playBell() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const frequencies = [523.25, 659.25, 783.99];
  frequencies.forEach((freq, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.3, ctx.currentTime + i * 0.15);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.15 + 0.8);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(ctx.currentTime + i * 0.15);
    osc.stop(ctx.currentTime + i * 0.15 + 0.8);
  });
}

// ──────────── Timer engine ────────────
const TICK = 250;
const SAVE_INTERVAL = 5000;
let _autoSaveInterval = null;

function ensureAutoSave() {
  if (_autoSaveInterval) return;
  _autoSaveInterval = setInterval(() => {
    const anyRunning = items.some(i => i.type === 'timer' && i.running);
    if (anyRunning) {
      save();
    } else {
      clearInterval(_autoSaveInterval);
      _autoSaveInterval = null;
    }
  }, SAVE_INTERVAL);
}

function startInterval(item, idx) {
  if (item._interval) return;
  ensureAutoSave();
  item._lastTick = Date.now();
  item._interval = setInterval(() => {
    const now = Date.now();
    item.elapsed += (now - item._lastTick) / 1000;
    item._lastTick = now;
    if (item.elapsed >= item.totalSeconds) {
      item.elapsed = item.totalSeconds;
      item.running = false;
      stopInterval(item);
      save();
      renderAll();
      playBell();
      return;
    }
    const row = listEl.children[items.indexOf(item)];
    if (!row) return;
    const pct = (item.elapsed / item.totalSeconds) * 100;
    row.querySelector('.bar').style.width = pct + '%';
    const elapsedInput = row.querySelector('.elapsed-input');
    if (elapsedInput && elapsedInput !== document.activeElement) {
      elapsedInput.value = formatTime(item.elapsed);
    }
  }, TICK);
}

function stopInterval(item) {
  if (item._interval) { clearInterval(item._interval); item._interval = null; }
}

function toggleTimer(item, idx) {
  if (item.elapsed >= item.totalSeconds) return;
  item.running = !item.running;
  if (item.running) { startInterval(item, idx); }
  else { stopInterval(item); }
  save();
  renderAll();
}

function resumeTimers() {
  items.forEach((item, idx) => {
    if (item.type === 'timer' && item.running) {
      startInterval(item, idx);
    }
  });
}

// ──────────── Helpers ────────────
function formatTime(sec) {
  sec = Math.round(sec);
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;
  if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function parseTime(str) {
  const parts = str.split(':').map(Number);
  if (parts.some(isNaN)) return null;
  if (parts.length === 3) return parts[0]*3600 + parts[1]*60 + parts[2];
  if (parts.length === 2) return parts[0]*60 + parts[1];
  if (parts.length === 1) return parts[0]*60;
  return null;
}

function esc(s) { return s.replace(/"/g, '&quot;').replace(/</g, '&lt;'); }

function hasNotes(item) {
  if (!item.notes || item.notes === '') return false;
  try {
    const delta = JSON.parse(item.notes);
    if (delta.ops) return delta.ops.some(op => typeof op.insert === 'string' ? op.insert.trim() !== '' : true);
  } catch {}
  return item.notes.trim() !== '';
}

function addTodo() {
  items.push({ type: 'todo', label: '', checked: false, notes: '' });
  save(); renderAll();
  listEl.querySelector('.item:last-of-type .item-label').focus();
}

function addTimer() {
  items.push({ type: 'timer', label: '', totalSeconds: 1500, elapsed: 0, running: false, notes: '' });
  save(); renderAll();
  listEl.querySelector('.item:last-of-type .item-label').focus();
}

function removeItem(idx) {
  const item = items.splice(idx, 1)[0];
  if (item._interval) stopInterval(item);
  save(); renderAll();
}

// ──────────── Drag & Drop reorder ────────────
let dragIdx = null;
let dropIndicator = null;

function getDropIndicator() {
  if (!dropIndicator) {
    dropIndicator = document.createElement('div');
    dropIndicator.className = 'drop-indicator';
  }
  return dropIndicator;
}

function renderAll() {
  listEl.innerHTML = '';
  items.forEach((item, idx) => {
    listEl.appendChild(item.type === 'timer' ? renderTimer(item, idx) : renderTodo(item, idx));
  });
  setupDragOnList();
}

function setupDragOnList() {
  const rows = listEl.querySelectorAll('.item');
  rows.forEach(row => {
    row.setAttribute('draggable', true);

    row.addEventListener('dragstart', e => {
      dragIdx = Number(row.dataset.idx);
      e.dataTransfer.effectAllowed = 'move';
      requestAnimationFrame(() => row.classList.add('dragging'));
    });

    row.addEventListener('dragend', () => {
      row.classList.remove('dragging');
      dragIdx = null;
      const ind = getDropIndicator();
      ind.classList.remove('visible');
      if (ind.parentNode) ind.parentNode.removeChild(ind);
    });
  });

  listEl.ondragover = e => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    if (dragIdx === null) return;

    const ind = getDropIndicator();
    const children = [...listEl.querySelectorAll('.item')];
    let insertBefore = null;

    for (const child of children) {
      const rect = child.getBoundingClientRect();
      if (e.clientY < rect.top + rect.height / 2) {
        insertBefore = child;
        break;
      }
    }

    if (insertBefore) {
      listEl.insertBefore(ind, insertBefore);
    } else {
      listEl.appendChild(ind);
    }
    ind.classList.add('visible');
  };

  listEl.ondragleave = e => {
    if (!listEl.contains(e.relatedTarget)) {
      const ind = getDropIndicator();
      ind.classList.remove('visible');
    }
  };

  listEl.ondrop = e => {
    e.preventDefault();
    const ind = getDropIndicator();
    ind.classList.remove('visible');
    if (dragIdx === null) return;

    const children = [...listEl.querySelectorAll('.item')];
    let dropIdx = children.length;
    for (let i = 0; i < children.length; i++) {
      const rect = children[i].getBoundingClientRect();
      if (e.clientY < rect.top + rect.height / 2) {
        dropIdx = i;
        break;
      }
    }

    const [moved] = items.splice(dragIdx, 1);
    const insertAt = dropIdx > dragIdx ? dropIdx - 1 : dropIdx;
    items.splice(insertAt, 0, moved);
    dragIdx = null;
    if (ind.parentNode) ind.parentNode.removeChild(ind);
    save(); renderAll();
  };
}

// ──────────── Fullscreen ────────────
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}
document.addEventListener('fullscreenchange', () => {
  document.getElementById('fs-btn').innerHTML = document.fullscreenElement ? '&#x2715;' : '&#x26F6;';
});

// ──────────── Init ────────────
renderAll();
resumeTimers();
</script>
</body>
</html>
